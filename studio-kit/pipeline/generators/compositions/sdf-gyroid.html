<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style> html, body { margin: 0; padding: 0; background: #04050c; overflow: hidden; } canvas { display: block; } </style>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
</head>
<body>
<script type="module">
// SDF GYROID — a RAYMARCHED gyroid lattice (the triply-periodic minimal surface sin(x)cos(y)+sin(y)cos(z)+sin(z)cos(x)=0,
// rendered as a thin shell bounded to a sphere). 9th distinct form, exploiting the raymarch CLASS with a totally different
// silhouette from the metaball blob: an intricate woven lattice. Fresnel-shaded violet→cyan, depth-faded for focal
// hierarchy, ACES + selective bloom + a CHOKED anamorphic streak (a lattice has DISTRIBUTED brights → host-suitability
// rule says choke it, not strong). Deterministic seek-capture. 1080x1920, 6s.
import * as THREE from './three.module.js';
import { clamp01, easeOut, anamorphicStreak, grainVignette } from './mg-core.js';
import { EffectComposer } from './jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from './jsm/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from './jsm/postprocessing/ShaderPass.js';
import { OutputPass } from './jsm/postprocessing/OutputPass.js';

const W = 1080, H = 1920;
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H); renderer.setPixelRatio(1); renderer.setClearColor(0x04050c, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0; renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const mat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uRes: { value: new THREE.Vector2(W, H) }, uIntro: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `precision highp float; varying vec2 vUv; uniform float uTime; uniform vec2 uRes; uniform float uIntro;
    float gyroid(vec3 p){ return dot(sin(p), cos(p.yzx)); }
    float map(vec3 p){
      float scl = 3.0 + 0.4 * sin(uTime * 0.5);            // lattice density breathes
      float g = abs(gyroid(p * scl)) / scl - 0.021;        // thin gyroid shell (the woven walls)
      float sph = length(p) - 1.5;                          // bound the lattice to a sphere
      return max(g, sph); }
    vec3 calcN(vec3 p){ vec2 e = vec2(0.0015, 0.0); return normalize(vec3(
      map(p+e.xyy)-map(p-e.xyy), map(p+e.yxy)-map(p-e.yxy), map(p+e.yyx)-map(p-e.yyx))); }
    void main(){ vec2 uv = vUv*2.0 - 1.0; uv.x *= uRes.x/uRes.y;
      vec3 ro = vec3(0.0, 0.0, 4.4); vec3 rd = normalize(vec3(uv, -2.0));
      float a = uTime*0.18; mat2 R = mat2(cos(a), -sin(a), sin(a), cos(a));
      ro.xz = R*ro.xz; rd.xz = R*rd.xz;
      float b = 0.45; mat2 RX = mat2(cos(b), -sin(b), sin(b), cos(b));   // tilt down so the lattice reads in 3D
      ro.yz = RX*ro.yz; rd.yz = RX*rd.yz;
      float t = 0.0; bool hit = false; float d;
      for(int i=0;i<150;i++){ d = map(ro + rd*t); if(d < 0.001){ hit = true; break; } t += d*0.7; if(t > 10.0) break; }
      vec3 col = vec3(0.015, 0.015, 0.04);
      if(hit){ vec3 p = ro + rd*t; vec3 n = calcN(p);
        float fres = pow(1.0 - max(dot(n, -rd), 0.0), 2.0);
        vec3 deep = vec3(0.05, 0.04, 0.16), violet = vec3(0.42, 0.28, 1.0), cyan = vec3(0.18, 0.90, 0.98);
        col = mix(deep, mix(violet, cyan, fres), fres);
        col += cyan * pow(fres, 4.0) * 0.8;
        float diff = max(dot(n, normalize(vec3(0.4, 0.7, 0.6))), 0.0);
        col += violet * diff * 0.3;
        col *= mix(1.3, 0.35, clamp((t - 3.0) / 3.2, 0.0, 1.0));     // depth fade → focal hierarchy, far lattice dims
      }
      gl_FragColor = vec4(col * uIntro, 1.0); }`,
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

const composer = new EffectComposer(renderer);
composer.setSize(W, H);
composer.addPass(new RenderPass(scene, cam));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.5, 0.45, 0.5));
// CHOKED streak — a lattice has DISTRIBUTED brights (host-suitability rule: only a full-frame/distributed bright washes,
// so high threshold + low strength → only the very hottest fresnel edges throw a faint horizontal flare).
const streakPass = new ShaderPass(anamorphicStreak(THREE, W, H, { strength: 0.9, threshold: 0.72, spread: 4.0 }));
composer.addPass(streakPass);
composer.addPass(new OutputPass());
// finishing pass (LAST): vignette + grain + triangular dither → band-free dark gradient (grain low per file-size caveat)
const grainPass = new ShaderPass(grainVignette(THREE, W, H, { grain: 0.022, vignette: 0.4 }));
composer.addPass(grainPass);

window.__seek = (t) => {
  mat.uniforms.uTime.value = t;
  mat.uniforms.uIntro.value = easeOut(clamp01(t / 0.8));
  streakPass.uniforms.uStrength.value = 0.9 * easeOut(clamp01((t - 0.5) / 1.0));
  grainPass.uniforms.uTime.value = t * 60.0;
  composer.render();
};
window.__seek(0);
window.__ready = true;
</script>
</body>
</html>
