<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#05070d;overflow:hidden}#c{display:block}</style>
<script type="importmap">{ "imports": { "three": "./three.module.js", "three/addons/": "./jsm/" } }</script>
</head><body><canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { clone as skClone } from 'three/addons/utils/SkeletonUtils.js';

const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(W,H); renderer.setPixelRatio(1);
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.62;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x0a0d16,0.022);
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,300);
const easeInOut=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const clamp01=t=>Math.max(0,Math.min(1,t)); const lerp=(a,b,t)=>a+(b-a)*t;

// ---- textured corridor (brick walls L/R, concrete floor), runs along -Z ----
const texLoader=new THREE.TextureLoader();
function pbr(dir,rx,ry){const load=(f,s)=>{const t=texLoader.load(`./textures/${dir}/${f}`);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rx,ry);if(s)t.colorSpace=THREE.SRGBColorSpace;return t;};return new THREE.MeshStandardMaterial({map:load('diff.jpg',true),normalMap:load('nor.jpg',false),roughnessMap:load('rough.jpg',false),roughness:1,metalness:0});}
const LEN=60, WIDE=12;
const floor=new THREE.Mesh(new THREE.PlaneGeometry(WIDE,LEN),pbr('concrete',4,18)); floor.rotation.x=-Math.PI/2; floor.position.z=-LEN/2+8; floor.receiveShadow=true; scene.add(floor);
function sideWall(x,ry){const m=new THREE.Mesh(new THREE.PlaneGeometry(LEN,10),pbr('brick',16,3));m.position.set(x,5,-LEN/2+8);m.rotation.y=ry;m.receiveShadow=true;scene.add(m);}
sideWall(-WIDE/2,Math.PI/2); sideWall(WIDE/2,-Math.PI/2);

// ---- lights: warm dawn glow at the far end they march toward ----
scene.add(new THREE.AmbientLight(0x2a3346,0.32));
const dawn=new THREE.PointLight(0xffc890,11.0,80,1.3); dawn.position.set(0,4,-34); scene.add(dawn);
// glowing doorway at the corridor end — the dawn they march toward (toneMapped:false stays bright + catches bloom)
const doorMat=new THREE.MeshStandardMaterial({color:0x000000, emissive:0xffd9a0, emissiveIntensity:6.0}); // reliable HDR glow → blooms
const door=new THREE.Mesh(new THREE.PlaneGeometry(WIDE*0.62,8.6), doorMat); door.position.set(0,4.3,-44.2); scene.add(door);
const endWall=new THREE.Mesh(new THREE.PlaneGeometry(WIDE,11),pbr('brick',8,3)); endWall.position.set(0,5.5,-44.4); endWall.receiveShadow=true; scene.add(endWall);
const ceiling=new THREE.Mesh(new THREE.PlaneGeometry(WIDE,LEN),pbr('concrete',4,18)); ceiling.rotation.x=Math.PI/2; ceiling.position.set(0,10,-LEN/2+8); scene.add(ceiling);
const fill=new THREE.DirectionalLight(0x6fb4ff,0.5); fill.position.set(3,8,6); scene.add(fill);
const keySpot=new THREE.SpotLight(0xfff0d8,3.2,70,Math.PI/4,0.5,1.2); keySpot.position.set(-4,12,2); keySpot.castShadow=true; keySpot.shadow.mapSize.set(2048,2048); keySpot.shadow.bias=-0.0004; scene.add(keySpot); scene.add(keySpot.target);

let envReady=false;
new RGBELoader().load('./hdris/empty_room.hdr',h=>{h.mapping=THREE.EquirectangularReflectionMapping;scene.environment=h;scene.environmentIntensity=0.25;envReady=true;maybeReady();});

// ---- crowd of walking robots (SkeletonUtils clones, independent mixers) ----
const SPEED=2.6;                                   // world units / sec forward (-Z)
const agents=[]; let baseReady=false;
const lanes=[ {x:-2.6,z:6,ph:0.0}, {x:0.2,z:9,ph:0.6}, {x:2.7,z:5,ph:0.3}, {x:-1.1,z:13,ph:0.9}, {x:1.6,z:16,ph:0.45}, {x:-3.0,z:20,ph:0.2} ];
new GLTFLoader().load('./models/RobotExpressive.glb',gltf=>{
  const walkClip=gltf.animations.find(c=>c.name==='Walking');
  for(const L of lanes){
    const r=skClone(gltf.scene); r.scale.set(0.7,0.7,0.7); r.position.set(L.x,0,L.z); r.rotation.y=Math.PI; // face -Z
    r.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
    scene.add(r);
    const mx=new THREE.AnimationMixer(r); const act=mx.clipAction(walkClip); act.play();
    agents.push({r,mx,lane:L});
  }
  baseReady=true; maybeReady();
});
function maybeReady(){ if(envReady&&baseReady) window.__ready=true; }

window.__seek=(t)=>{
  for(const a of agents){
    a.mx.setTime(t*1.25 + a.lane.ph*1.2);        // leg cycle (phase-staggered)
    let z=a.lane.z - t*SPEED;                      // march forward (-Z)
    if(z<-44){ z+=64; }                            // loop back into corridor
    a.r.position.z=z;
    a.r.position.x=a.lane.x + Math.sin(t*1.4+a.lane.ph*6)*0.05; // subtle sway
  }
  // camera follows behind, slow dolly forward + slight rise (tracking the crowd toward the light)
  const p=clamp01(t/5), e=easeInOut(p);
  camera.position.set(lerp(0.4,-0.3,e), lerp(4.4,3.8,e), lerp(15,10.5,e));
  camera.lookAt(0,2.7,-16);
  keySpot.target.position.set(0,1.8,-2);
  renderer.render(scene,camera);
};
</script></body></html>
