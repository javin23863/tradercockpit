<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: #06060c; overflow: hidden; }
  canvas { display: block; }
</style>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
</head>
<body>
<script type="module">
// ITM 1 — SHATTER. A tight glowing word/grid of glyph-points holds, then at t~1.2 VIOLENTLY shatters into a storm of
// hundreds of small digit-like particles that scatter outward + recede into the fog (DOF falloff). Camera slow push-in.
// Violet core, cyan sparks on the shatter burst. Three.js seek-capture, deterministic per t for headless render.
import * as THREE from './three.module.js';
import { mulberry32, clamp01, smoothstep, easeOut, easeInOut, mix3 } from './mg-core.js';
import { EffectComposer } from './jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './jsm/postprocessing/RenderPass.js';
import { OutputPass } from './jsm/postprocessing/OutputPass.js';
import { ShaderPass } from './jsm/postprocessing/ShaderPass.js';
import { grainVignette } from './mg-core.js';

const W = 1080, H = 1920, DUR = 5;
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.setClearColor(0x06060c, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06060c, 0.05);
const camera = new THREE.PerspectiveCamera(48, W / H, 0.1, 100);
// composer: RenderPass → OutputPass → grainVignette finisher. NO bloom — additive points already glow; bloom washes
// the digit sparks to solid white. Glow = AdditiveBlending + soft sprite.
const composer = new EffectComposer(renderer);
composer.setSize(W, H);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new OutputPass());
const grainPass = new ShaderPass(grainVignette(THREE, W, H, { grain: 0.02, vignette: 0.4 }));
composer.addPass(grainPass);

// ---- deterministic RNG ----
const rnd = mulberry32(20260624);

// ---- soft circular sprite for glowing points ----
function softDot() {
  const s = 64, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.28, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.6, 'rgba(255,255,255,0.2)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true; return tex;
}
const dotTex = softDot();

const COL_VIOLET = [0.42, 0.30, 1.0];
const COL_CYAN = [0.16, 0.86, 0.96];

// ---- 5x7 bitmap font for the word the cluster spells (forms a legible glyph-grid that READS as AI/data) ----
const GLYPHS = {
  A: ['01110', '10001', '10001', '11111', '10001', '10001', '10001'],
  I: ['11111', '00100', '00100', '00100', '00100', '00100', '11111'],
  D: ['11110', '10001', '10001', '10001', '10001', '10001', '11110'],
  T: ['11111', '00100', '00100', '00100', '00100', '00100', '00100'],
  '0': ['01110', '10001', '10011', '10101', '11001', '10001', '01110'],
  '1': ['00100', '01100', '00100', '00100', '00100', '00100', '01110'],
};
const WORD = 'DATA';
const CELL = 0.13;          // spacing between bitmap dots
const GLYPH_W = 5, GLYPH_H = 7;
const GLYPH_GAP = 1;        // empty columns between letters
const SUB = 30;             // sub-samples per lit cell → ~1950 points: dense word AND a dense full-frame storm

// ---- build the word as densely-sampled glyph points (the cluster that shatters) ----
const wordCols = WORD.length * GLYPH_W + (WORD.length - 1) * GLYPH_GAP;
const wordOriginX = -(wordCols - 1) * 0.5 * CELL;
const wordOriginY = (GLYPH_H - 1) * 0.5 * CELL;

const parts = [];           // each: {ox,oy,oz (word home), tx,ty,tz (scatter target), seed, size, sparkBias}
let colCursor = 0;
for (let li = 0; li < WORD.length; li++) {
  const rows = GLYPHS[WORD[li]] || GLYPHS['0'];
  for (let r = 0; r < GLYPH_H; r++) {
    for (let cc = 0; cc < GLYPH_W; cc++) {
      if (rows[r][cc] !== '1') continue;
      const cx = colCursor + cc;
      for (let s = 0; s < SUB; s++) {
        // home position: bitmap cell + small jitter, slight z-depth so the word has thickness
        const ox = wordOriginX + cx * CELL + (rnd() - 0.5) * CELL * 0.85;
        const oy = wordOriginY - r * CELL + (rnd() - 0.5) * CELL * 0.85;
        const oz = (rnd() - 0.5) * 0.18;
        // SHATTER target: a STRONG outward lateral throw (the screen-space silhouette visibly breaks apart) PLUS a
        // recede in -Z so the storm also streams into the fog (vanishing-point depth + DOF falloff). The recede shrinks
        // the points in perspective so the wide lateral throw still reads mostly in-frame.
        const dir = rnd() * Math.PI * 2;                 // fully random direction → particles CROSS and fill the center (no donut hole)
        const reach = 1.1 + rnd() * 2.0;                 // moderate throw → dense storm that STAYS in-frame & bright
        const tx = ox + Math.cos(dir) * reach;
        const ty = oy + Math.sin(dir) * reach * 1.5 + (rnd() - 0.5) * 3.2;   // taller spread → fills the 9:16 frame
        const tz = oz - (0.3 + rnd() * 2.4);             // shallow recede → stays near the focal plane (stays bright)
        parts.push({ ox, oy, oz, tx, ty, tz, seed: rnd(), size: 0.05 + rnd() * 0.05, sparkBias: rnd() });
      }
    }
  }
  colCursor += GLYPH_W + GLYPH_GAP;
}
const N = parts.length;

// ---- extra ambient depth dust (faint particles drifting in the fog, framing the word) ----
const DUST = 420;
const dust = [];
for (let i = 0; i < DUST; i++) {
  dust.push({
    x: (rnd() - 0.5) * 14, y: (rnd() - 0.5) * 18, z: -2 - rnd() * 12,
    size: 0.03 + rnd() * 0.05, ph: rnd() * Math.PI * 2, seed: rnd(),
  });
}

// ---- geometry builders ----
function makePoints(count, sizeArr) {
  const pos = new Float32Array(count * 3), col = new Float32Array(count * 3);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const m = new THREE.PointsMaterial({ size: sizeArr, map: dotTex, vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true });
  const p = new THREE.Points(g, m); scene.add(p);
  return { points: p, pos: g.attributes.position, col: g.attributes.color };
}
const shard = makePoints(N, 0.14);
const dustG = makePoints(DUST, 0.06);

// ---- timing ----
const T_SHATTER = 1.7;      // hold the legible word longer (it's the hero image), then break
const BURST = 0.55;         // seconds of fastest scatter

// brightness by distance from camera-axis depth → bright near the focal plane, faint as it recedes into fog.
// Keyed mostly on -Z (recede) + a soft radial term, so a WIDE lateral spark near the focal plane stays bright
// (the storm reads) and only the receded particles dim (DOF falloff).
function depthGrade(x, y, z) {
  const recede = 1 - smoothstep(-1.5, -11.5, z);         // 1 near plane → 0 deep in fog (longer reach → storm stays visible)
  const radial = 1 - smoothstep(6.5, 15.0, Math.hypot(x, y));
  return 0.3 + 0.7 * recede * (0.6 + 0.4 * radial);
}

function paintShards(t) {
  const p = shard.pos.array, c = shard.col.array;
  // global shatter progress: 0 before break, then VIOLENT initial kick that EASES OUT across the rest of the shot — the
  // storm keeps streaming outward + receding (it is NOT over by 1.7; it scatters and recedes over the full remaining ~3.8s).
  const fast = clamp01((t - T_SHATTER) / 0.45);               // the violent initial KICK (sharp velocity at the break)
  const drift = clamp01((t - T_SHATTER) / (DUR - T_SHATTER)); // the continued scatter+recede across the shot
  const flyG = 0.5 * (1 - Math.pow(1 - fast, 3)) + 0.5 * easeOut(drift);
  // pre-shatter "charge" — the word tightens + brightens just before the break
  const charge = smoothstep(0.0, T_SHATTER, t);
  // burst intensity peaks right at the break, fades over BURST (drives the cyan sparks)
  const burst = Math.max(0, 1 - Math.abs(t - T_SHATTER) / BURST) ** 1.4;

  for (let i = 0; i < N; i++) {
    const o = parts[i];
    // per-particle stagger so the shatter ripples out from center, not all-at-once
    const stagger = o.seed * 0.22;
    const fp = clamp01((flyG - stagger) / (1 - stagger + 1e-4));
    // jitter before break: a fine vibration that grows as charge builds
    const vib = (charge) * 0.012 * Math.sin(t * 34 + o.seed * 60);
    // continued life: once scattered, each particle keeps drifting on a slow turbulent orbit so the storm stays ALIVE (never freezes/empties)
    const swirlA = t * 0.6 + o.seed * 6.2832;
    const sw = fp * (0.16 + o.seed * 0.24);
    const x = o.ox + (o.tx - o.ox) * fp + vib + Math.cos(swirlA) * sw;
    const y = o.oy + (o.ty - o.oy) * fp + vib * 0.7 + Math.sin(swirlA * 0.8) * sw;
    const z = o.oz + (o.tz - o.oz) * fp + Math.sin(swirlA * 0.5) * sw * 0.5;
    p[i * 3] = x; p[i * 3 + 1] = y; p[i * 3 + 2] = z;

    const dg = depthGrade(x, y, z);
    // base intensity: word is solid violet pre-break; scattered points dim only as they recede into fog (dg).
    const baseB = (2.3 + 0.7 * charge) * dg;
    // cyan spark: a violent FLASH on the break that stays hot on the flying particles regardless of spread (only the
    // recede dims it via a light dg term), biased per-particle so sparks twinkle through the storm.
    const spark = burst * (0.5 + 0.7 * o.sparkBias) * (0.45 + 0.55 * dg);
    const col = mix3(COL_VIOLET, COL_CYAN, clamp01(spark));
    const b = baseB + spark * 1.9;
    c[i * 3] = col[0] * b;
    c[i * 3 + 1] = col[1] * b;
    c[i * 3 + 2] = col[2] * b;
  }
  shard.pos.needsUpdate = true; shard.col.needsUpdate = true;
}

function paintDust(t) {
  const p = dustG.pos.array, c = dustG.col.array;
  const wake = smoothstep(T_SHATTER - 0.1, T_SHATTER + 0.8, t);  // dust lights faintly as the burst passes
  for (let i = 0; i < DUST; i++) {
    const d = dust[i];
    const x = d.x + Math.sin(t * 0.25 + d.ph) * 0.25;
    const y = d.y + Math.cos(t * 0.2 + d.ph) * 0.25;
    const z = d.z;
    p[i * 3] = x; p[i * 3 + 1] = y; p[i * 3 + 2] = z;
    const dg = depthGrade(x, y, z);
    const tw = 0.5 + 0.5 * Math.sin(t * 1.5 + d.seed * 40);      // twinkle
    const b = (0.14 + 0.32 * wake) * dg * tw;
    const col = mix3(COL_VIOLET, COL_CYAN, d.seed * 0.5);
    c[i * 3] = col[0] * b; c[i * 3 + 1] = col[1] * b; c[i * 3 + 2] = col[2] * b;
  }
  dustG.pos.needsUpdate = true; dustG.col.needsUpdate = true;
}

window.__seek = (t) => {
  const p = clamp01(t / DUR);
  // slow push-in dolly: start back, ease toward the word; gentle drift + a tiny shake on the break
  const dolly = easeInOut(p);
  const z = 8.6 - dolly * 3.4;                           // 8.6 → 5.2
  const shake = Math.max(0, 1 - Math.abs(t - T_SHATTER) / 0.4) * 0.06;  // tiny impact shake at the break
  camera.position.set(
    Math.sin(t * 0.18) * 0.5 + Math.sin(t * 40) * shake,
    Math.sin(t * 0.22 + 0.4) * 0.35 + Math.cos(t * 38) * shake,
    z
  );
  camera.lookAt(0, 0, 0);
  // slow scene parallax
  scene.rotation.y = Math.sin(t * 0.12) * 0.07;

  paintShards(t);
  paintDust(t);
  grainPass.uniforms.uTime.value = t * 60.0;
  composer.render();
};

// prime first frame then signal ready
window.__seek(0);
window.__ready = true;
</script>
</body>
</html>
