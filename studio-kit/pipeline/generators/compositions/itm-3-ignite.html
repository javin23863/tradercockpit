<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: #06060c; overflow: hidden; }
  canvas { display: block; }
</style>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
</head>
<body>
<script type="module">
// ITM 3 — THE NETWORK IGNITES. A dense neural volume (360 nodes in an ellipsoid, ~1200 nearest-neighbor edges).
// An ACTIVATION WAVE travels OUTWARD from the core, igniting nodes by depth; bright pulses sprint along edges.
// Slow orbital camera with a dolly-in. Depth-graded brightness (bright core → faint edges in fog). Centerpiece.
// Seeked by absolute time t for deterministic Puppeteer capture. Glow = AdditiveBlending + soft sprite, NO bloom.
import * as THREE from './three.module.js';
import { mulberry32, clamp01, smoothstep, easeOut, easeInOut, mix3 } from './mg-core.js';
import { EffectComposer } from './jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './jsm/postprocessing/RenderPass.js';
import { OutputPass } from './jsm/postprocessing/OutputPass.js';
import { ShaderPass } from './jsm/postprocessing/ShaderPass.js';
import { grainVignette } from './mg-core.js';

const W = 1080, H = 1920, DUR = 5;
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.setClearColor(0x06060c, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06060c, 0.075);                 // deep fog → real depth falloff on a dense volume
const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);

// composer: RenderPass → OutputPass → grainVignette finisher. NO UnrealBloomPass — additive glowing points already
// glow; bloom would wash a 360-node volume to solid white. Glow = AdditiveBlending + soft sprite (engine contract).
const composer = new EffectComposer(renderer);
composer.setSize(W, H);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new OutputPass());
const grainPass = new ShaderPass(grainVignette(THREE, W, H, { grain: 0.02, vignette: 0.4 }));
composer.addPass(grainPass);

// ---- deterministic RNG (frame-deterministic for seek-capture — NO Math.random anywhere) ----
const rnd = mulberry32(20260624);

// ---- soft radial-gradient sprite for glowing points (tight core = SHARP detail, not a soft blob) ----
function softDot() {
  const s = 64, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  grad.addColorStop(0.0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.22, 'rgba(255,255,255,0.9)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.28)');
  grad.addColorStop(1.0, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true; return tex;
}
const dotTex = softDot();

// ---- PALETTE (shared across all 6 scenes for continuity) ----
const VIOLET = [0.42, 0.30, 1.0];
const CYAN = [0.16, 0.86, 0.96];

// ---- build a DENSE ellipsoid node cloud (fibonacci shell + interior fill, jittered) ----
const N = 360;
const nodes = [];
const ELL = [1.55, 2.5, 1.55];                                 // ellipsoid radii (taller than wide)
let maxDist = 0;
for (let i = 0; i < N; i++) {
  // fibonacci direction for even angular spread
  const y = 1 - (i / (N - 1)) * 2;
  const rr = Math.sqrt(Math.max(0, 1 - y * y));
  const phi = i * Math.PI * (3 - Math.sqrt(5));
  // fill the VOLUME, not just a shell: cube-root radius bias packs more toward the core
  const t = Math.cbrt(0.18 + 0.82 * rnd());
  const dx = Math.cos(phi) * rr, dy = y, dz = Math.sin(phi) * rr;
  const jx = (rnd() - 0.5) * 0.42, jy = (rnd() - 0.5) * 0.42, jz = (rnd() - 0.5) * 0.42;
  const x = dx * ELL[0] * t + jx;
  const yy = dy * ELL[1] * t + jy;
  const z = dz * ELL[2] * t + jz;
  const dist = Math.hypot(x, yy, z);
  maxDist = Math.max(maxDist, dist);
  nodes.push({ x, y: yy, z, dist, hub: false });
}
// promote the most-central nodes to bright HUBS (the igniting core)
const byDist = nodes.map((n, i) => [i, n.dist]).sort((a, b) => a[1] - b[1]);
for (let k = 0; k < 14; k++) nodes[byDist[k][0]].hub = true;

// ---- edges: connect each node to its nearest neighbors, dedup, ~1200 total ----
const edges = [];
const seen = new Set();
for (let i = 0; i < N; i++) {
  const d = [];
  for (let j = 0; j < N; j++) {
    if (j === i) continue;
    d.push([j, Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y, nodes[i].z - nodes[j].z)]);
  }
  d.sort((a, b) => a[1] - b[1]);
  const k = nodes[i].hub ? 8 : 4;                              // hubs are more connected
  for (let m = 0; m < k && m < d.length; m++) {
    const j = d[m][0], len = d[m][1];
    if (len > 1.55) continue;                                  // only short links (clean local mesh)
    const key = i < j ? `${i}_${j}` : `${j}_${i}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const mx = (nodes[i].x + nodes[j].x) / 2, my = (nodes[i].y + nodes[j].y) / 2, mz = (nodes[i].z + nodes[j].z) / 2;
    edges.push({ a: i, b: j, mid: Math.hypot(mx, my, mz), len, phase: rnd() });
  }
}

// ---- depth-graded focal weight: brightest at the core, dissolving to faint at the edges/in fog ----
const centerWeight = dist => 0.18 + 0.82 * (1 - smoothstep(1.4, 3.3, dist));

// ---- ACTIVATION WAVE: an expanding ring travels OUTWARD from the core, igniting nodes at its radius ----
function waveRadius(t) { return easeOut(clamp01(t / 2.6)) * (maxDist + 0.6); }   // sweeps the whole volume by ~2.6s
function activation(dist, t) {
  const wr = waveRadius(t);
  // bright spike where the wave front sits on this node's depth, then a warm sustained afterglow
  const front = Math.exp(-Math.pow((dist - wr) * 1.7, 2)) * 1.4;
  const lit = smoothstep(0.0, 0.45, wr - dist);                // 0 until the wave has passed this depth
  const shimmer = 0.5 + 0.5 * Math.sin(dist * 2.2 - t * 3.4);  // living shimmer behind the front
  return clamp01(front + lit * (0.35 + 0.32 * shimmer));
}
// nodes fade IN as the wave nears them (no pop)
function nodeIntro(dist, t) { return easeOut(clamp01((waveRadius(t) - dist + 0.5) / 0.9)); }

// ---- points: regular nodes + bright hubs ----
function makePoints(filter, size) {
  const idx = []; for (let i = 0; i < N; i++) if (filter(nodes[i])) idx.push(i);
  const pos = new Float32Array(idx.length * 3), col = new Float32Array(idx.length * 3);
  idx.forEach((i, k) => { pos[k * 3] = nodes[i].x; pos[k * 3 + 1] = nodes[i].y; pos[k * 3 + 2] = nodes[i].z; });
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const m = new THREE.PointsMaterial({ size, map: dotTex, vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true });
  scene.add(new THREE.Points(g, m));
  return { idx, col, attr: g.attributes.color };
}
const pts = makePoints(n => !n.hub, 0.14);
const hubs = makePoints(n => n.hub, 0.5);

function paintPoints(group, t, glow) {
  for (let k = 0; k < group.idx.length; k++) {
    const n = nodes[group.idx[k]];
    const intro = nodeIntro(n.dist, t);
    const act = activation(n.dist, t);
    const cw = centerWeight(n.dist) * glow * intro;
    const base = 0.14 + (n.hub ? 0.16 : 0);
    // violet rest state → cyan ignition; brightness depth-graded by cw
    const c = mix3(VIOLET, CYAN, clamp01(act));
    const amp = (base + act * 1.15) * cw;
    group.col[k * 3]     = c[0] * amp;
    group.col[k * 3 + 1] = c[1] * amp;
    group.col[k * 3 + 2] = c[2] * amp + VIOLET[2] * base * cw * 0.4;   // hold a faint violet floor
  }
  group.attr.needsUpdate = true;
}

// ---- edges: per-vertex color so a bright PULSE can travel a→b along each edge ----
const lpos = new Float32Array(edges.length * 6), lcol = new Float32Array(edges.length * 6);
edges.forEach((e, k) => {
  const A = nodes[e.a], B = nodes[e.b];
  lpos[k * 6] = A.x; lpos[k * 6 + 1] = A.y; lpos[k * 6 + 2] = A.z;
  lpos[k * 6 + 3] = B.x; lpos[k * 6 + 4] = B.y; lpos[k * 6 + 5] = B.z;
});
const lg = new THREE.BufferGeometry();
lg.setAttribute('position', new THREE.BufferAttribute(lpos, 3));
lg.setAttribute('color', new THREE.BufferAttribute(lcol, 3));
const lines = new THREE.LineSegments(lg, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
scene.add(lines);

function paintLines(t) {
  for (let k = 0; k < edges.length; k++) {
    const e = edges[k];
    // edge reveals only after the wave has reached it
    const rev = clamp01((waveRadius(t) - e.mid + 0.4) / 0.8);
    const cw = centerWeight(e.mid);
    const actA = activation(nodes[e.a].dist, t), actB = activation(nodes[e.b].dist, t);
    const baseGlow = rev * cw * (0.1 + 0.4 * (actA + actB) * 0.5);
    // a pulse sprinting a→b: position p in [0,1] over time, gaussian bright spot
    const p = (t * 0.9 + e.phase) % 1.0;
    const fade = rev;                                          // pulses only on revealed edges
    for (const endA of [true, false]) {
      const o = endA ? 0 : 3;
      const u = endA ? 0 : 1;                                  // this vertex's position along the edge
      const pulse = Math.exp(-Math.pow((u - p) * 3.2, 2)) * 1.5 * fade;
      const act = endA ? actA : actB;
      const c = mix3(VIOLET, CYAN, clamp01(act * 0.6 + pulse * 0.7));
      const amp = baseGlow + pulse * cw;
      lcol[k * 6 + o]     = c[0] * amp;
      lcol[k * 6 + o + 1] = c[1] * amp;
      lcol[k * 6 + o + 2] = c[2] * amp;
    }
  }
  lines.geometry.attributes.color.needsUpdate = true;
}

window.__seek = (t) => {
  const p = clamp01(t / DUR);
  // SLOW ORBITAL CAMERA with a DOLLY-IN (real eased move): swings ~75° while pulling from 8.4 → 5.6
  const orbit = easeInOut(p);
  const ang = -0.7 + orbit * 1.3;
  const radius = 8.4 - easeOut(p) * 2.8;
  const lift = 0.9 * Math.sin(t * 0.35 + 0.25) - 0.1;          // gentle vertical drift for parallax
  camera.position.set(Math.sin(ang) * radius, lift, Math.cos(ang) * radius);
  camera.lookAt(0, 0, 0);
  // slow scene spin layers extra parallax depth on top of the orbit
  scene.rotation.y = t * 0.05;

  paintPoints(pts, t, 1.45);
  paintPoints(hubs, t, 2.1);
  paintLines(t);

  grainPass.uniforms.uTime.value = t * 60.0;
  composer.render();
};

// prime the first frame, then signal ready for the seek-capture harness
window.__seek(0);
window.__ready = true;
</script>
</body>
</html>
