<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
html, body { margin: 0; padding: 0; background: #060309; overflow: hidden; }
canvas { display: block; position: absolute; inset: 0; }
#hud { position: absolute; inset: 0; z-index: 2; font-family: "Cascadia Mono", Consolas, monospace;
  color: #F5E8EA; display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; padding: 0 8vw; }
#sig { position: absolute; top: 4.5vh; left: 0; right: 0; text-align: center; color: #7a4a52;
  font-size: 1.1vw; letter-spacing: .6em; }
#kicker { color: #FF3D5E; font-size: 1.35vw; letter-spacing: .32em; margin-bottom: 2.2vh;
  text-transform: uppercase; text-shadow: 0 0 22px rgba(255,23,68,.7);
  background: rgba(6,3,9,.78); padding: .8vh 1vw .8vh 1.4vw;
  border-left: .28vw solid #FF1744; }
#title { font-size: 3.6vw; font-weight: 700; line-height: 1.3; white-space: pre-wrap;
  text-shadow: 0 2px 30px rgba(0,0,0,.85); }
#title .hl { color: #FF1744; text-shadow: 0 0 26px rgba(255,23,68,.6); }
#counter { font-size: 8vw; font-weight: 700; font-variant-numeric: tabular-nums;
  text-shadow: 0 0 50px rgba(255,23,68,.45), 0 2px 24px rgba(0,0,0,.9); }
#counterlbl { color: #c89aa3; font-size: 1.3vw; letter-spacing: .45em; margin-top: 1vh; text-transform: uppercase; }
#lines { margin-top: 3.6vh; display: flex; flex-direction: column; gap: 1.2vh; }
#lines .ln { font-size: 1.65vw; color: #e8d5d9; border-left: .28vw solid #3a0d1a;
  padding: .7vh 1.4vw; text-align: left; opacity: 0; background: rgba(6,3,9,.62);
  backdrop-filter: blur(2px); box-shadow: 0 0 30px rgba(0,0,0,.5); }
#lines .ln b { color: #fff } .ok { color: #00E676 } .bad { color: #FF5E79 } .warn { color: #FF9100 }
#scan { position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.13) 0 2px, transparent 2px 5px); }
</style>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
</head>
<body>
<div id="hud">
  <div id="sig">TRADERCOCKPIT</div>
  <div id="kicker"></div>
  <div id="title"></div>
  <div id="counter" style="display:none"></div>
  <div id="counterlbl" style="display:none"></div>
  <div id="lines"></div>
</div>
<div id="scan"></div>
<script type="module">
// TC-CARD — TraderCockpit hero card: cfg.json-driven HUD text over one of three seekable 3D
// backgrounds (bulb = raymarched power-8 Mandelbulb; corridor = forward flight through glowing
// rings; net = breathing particle-web). Crimson/cyan brand palette. Deterministic 1920x1080.
import * as THREE from './three.module.js';
import { mulberry32, clamp01, easeOut, mix3, grainVignette } from './mg-core.js';
import { EffectComposer } from './jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from './jsm/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from './jsm/postprocessing/ShaderPass.js';
import { OutputPass } from './jsm/postprocessing/OutputPass.js';

const W = 1920, H = 1080;
const CRIMSON = [1.0, 0.09, 0.27], CYAN = [0.16, 0.90, 0.98], VIOLET = [0.50, 0.30, 1.0];
const cfg = await fetch('cfg.json').then(r => r.json()).catch(() => ({ bg: 'net', title: 'TC CARD' }));

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H); renderer.setPixelRatio(1); renderer.setClearColor(0x060309, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 0.85;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.insertBefore(renderer.domElement, document.getElementById('hud'));
const scene = new THREE.Scene();
const rnd = mulberry32(20260713);

const composer = new EffectComposer(renderer);
composer.setSize(W, H);
let seekBg = () => {};

if (cfg.bg === 'bulb') {
  const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uRes: { value: new THREE.Vector2(W, H) }, uIntro: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
    fragmentShader: `precision highp float; varying vec2 vUv; uniform float uTime; uniform vec2 uRes; uniform float uIntro;
      float mandelDE(vec3 p, out float trap){
        vec3 z = p; float dr = 1.0; float r = 0.0; const float power = 8.0; trap = 1e10;
        for(int i=0;i<7;i++){
          r = length(z); if(r > 2.0) break;
          float theta = acos(clamp(z.z/r, -1.0, 1.0)); float phi = atan(z.y, z.x);
          dr = pow(r, power-1.0)*power*dr + 1.0;
          float zr = pow(r, power); theta *= power; phi *= power;
          z = zr*vec3(sin(theta)*cos(phi), sin(theta)*sin(phi), cos(theta)) + p;
          trap = min(trap, r);
        }
        return 0.5*log(max(r, 1e-6))*r/dr;
      }
      float map(vec3 p, out float trap){ return mandelDE(p, trap); }
      vec3 calcN(vec3 p){ vec2 e = vec2(0.0008, 0.0); float tr;
        return normalize(vec3(
          map(p+e.xyy, tr)-map(p-e.xyy, tr), map(p+e.yxy, tr)-map(p-e.yxy, tr), map(p+e.yyx, tr)-map(p-e.yyx, tr))); }
      void main(){ vec2 uv = vUv*2.0 - 1.0; uv.x *= uRes.x/uRes.y;
        uv.x += 0.55;                                    // push the bulb left of the HUD text
        vec3 ro = vec3(0.0, 0.0, 3.4); vec3 rd = normalize(vec3(uv, -2.6));
        float a = uTime*0.18; mat2 R = mat2(cos(a), -sin(a), sin(a), cos(a)); ro.xz = R*ro.xz; rd.xz = R*rd.xz;
        float b = 0.42; mat2 RX = mat2(cos(b), -sin(b), sin(b), cos(b)); ro.yz = RX*ro.yz; rd.yz = RX*rd.yz;
        float t = 0.0; bool hit = false; float d; float trap = 0.0;
        for(int i=0;i<90;i++){ d = map(ro + rd*t, trap); if(d < 0.0006){ hit = true; break; } t += d*0.85; if(t > 6.0) break; }
        vec3 col = vec3(0.012, 0.008, 0.02);
        if(hit){ vec3 p = ro + rd*t; vec3 n = calcN(p);
          float fres = pow(1.0 - max(dot(n, -rd), 0.0), 2.0);
          vec3 deep = vec3(0.10, 0.02, 0.05), crimson = vec3(1.0, 0.09, 0.27), cyan = vec3(0.16, 0.90, 0.98);
          float tc = clamp(trap * 1.3, 0.0, 1.0);
          col = mix(deep, mix(crimson, cyan, tc), 0.12 + 0.26*fres);
          col += crimson * pow(fres, 5.0) * 0.65;
          float diff = max(dot(n, normalize(vec3(0.5, 0.7, 0.4))), 0.0);
          col += crimson * diff * 0.20;
          col *= mix(1.1, 0.5, clamp((t - 2.6) / 1.6, 0.0, 1.0));
        }
        gl_FragColor = vec4(col * uIntro, 1.0); }`,
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));
  composer.addPass(new RenderPass(scene, cam));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.35, 0.4, 0.6));
  seekBg = (t) => { mat.uniforms.uTime.value = t; mat.uniforms.uIntro.value = easeOut(clamp01(t / 0.8)); };

} else if (cfg.bg === 'corridor') {
  scene.fog = new THREE.FogExp2(0x060309, 0.028);
  const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 120);
  const N = 34, RANGE = 56, CAMZ = 6, rings = [];
  for (let i = 0; i < N; i++) {
    const R = 2.6 + 0.55 * Math.sin(i * 1.27) + (rnd() - 0.5) * 0.2;
    const m = new THREE.Mesh(new THREE.TorusGeometry(R, 0.055 + rnd() * 0.02, 8, 80),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(0, 0, 0), toneMapped: false }));
    scene.add(m);
    rings.push({ m, baseZ: (i / N) * RANGE, twist: i * 0.42, hue: i * 0.6 });
  }
  const NP = 700, pbase = new Float32Array(NP * 3), pcol = new Float32Array(NP * 3),
    ppos = new Float32Array(NP * 3), pz = new Float32Array(NP);
  for (let i = 0; i < NP; i++) {
    const a = rnd() * Math.PI * 2, rr = 0.4 + rnd() * 3.0;
    pbase[i*3] = Math.cos(a) * rr; pbase[i*3+1] = Math.sin(a) * rr; pz[i] = rnd() * RANGE;
    const c = rnd() > 0.5 ? CRIMSON : CYAN; const d = 0.3 + rnd() * 0.5;
    pcol[i*3] = c[0]*d; pcol[i*3+1] = c[1]*d; pcol[i*3+2] = c[2]*d;
  }
  const pgeo = new THREE.BufferGeometry();
  pgeo.setAttribute('position', new THREE.BufferAttribute(ppos, 3));
  pgeo.setAttribute('color', new THREE.BufferAttribute(pcol, 3));
  const dotTex = (() => { const s=32,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);gr.addColorStop(0,'#fff');gr.addColorStop(0.5,'rgba(255,255,255,0.3)');gr.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=gr;g.fillRect(0,0,s,s);const tx=new THREE.CanvasTexture(c);tx.needsUpdate=true;return tx;})();
  scene.add(new THREE.Points(pgeo, new THREE.PointsMaterial({ size: 0.12, map: dotTex, vertexColors: true,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true, toneMapped: false })));
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.4, 0.45, 0.35));
  seekBg = (t) => {
    const intro = easeOut(clamp01(t / 0.6));
    const dx = Math.sin(t * 0.32) * 0.35, dy = Math.cos(t * 0.27) * 0.28;
    camera.position.set(dx, dy, CAMZ);
    camera.lookAt(dx * 0.4, dy * 0.4, -60);
    camera.rotation.z = Math.sin(t * 0.22) * 0.07;
    for (const r of rings) {
      const phase = (((r.baseZ - t * 10) % RANGE) + RANGE) % RANGE;
      r.m.position.z = (CAMZ - 2) - phase;
      r.m.rotation.z = r.twist + t * 0.16;
      const near = 1 - clamp01(phase / RANGE);
      const fade = clamp01((RANGE - phase) / (RANGE * 0.16)) * clamp01((phase - 2.0) / 9.0);
      const pulse = 0.62 + 0.38 * Math.sin(phase * 0.42 - t * 2.2);
      const b = (0.12 + near * near * 1.3) * fade * pulse * intro;
      const m = 0.5 + 0.5 * Math.sin(r.hue + t * 0.3);
      const c = mix3(CRIMSON, CYAN, m);
      r.m.material.color.setRGB(c[0] * b, c[1] * b, c[2] * b);
    }
    for (let i = 0; i < NP; i++) {
      const phase = (((pz[i] - t * 10) % RANGE) + RANGE) % RANGE;
      ppos[i*3] = pbase[i*3]; ppos[i*3+1] = pbase[i*3+1]; ppos[i*3+2] = (CAMZ - 2) - phase;
    }
    pgeo.attributes.position.needsUpdate = true;
  };

} else { // net — breathing particle web
  const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
  camera.position.set(0, 0, 11);
  const NN = 260, base = [], pos = new Float32Array(NN * 3), col = new Float32Array(NN * 3);
  for (let i = 0; i < NN; i++) {
    const v = new THREE.Vector3((rnd()-0.5)*17, (rnd()-0.5)*9.5, (rnd()-0.5)*7);
    base.push({ v, ph: rnd() * Math.PI * 2, sp: 0.4 + rnd() * 0.7 });
    const c = rnd() > 0.72 ? CRIMSON : (rnd() > 0.5 ? CYAN : VIOLET); const d = 0.5 + rnd() * 0.5;
    col[i*3] = c[0]*d; col[i*3+1] = c[1]*d; col[i*3+2] = c[2]*d;
  }
  const pgeo = new THREE.BufferGeometry();
  pgeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  pgeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const dotTex = (() => { const s=32,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);gr.addColorStop(0,'#fff');gr.addColorStop(0.55,'rgba(255,255,255,0.35)');gr.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=gr;g.fillRect(0,0,s,s);const tx=new THREE.CanvasTexture(c);tx.needsUpdate=true;return tx;})();
  scene.add(new THREE.Points(pgeo, new THREE.PointsMaterial({ size: 0.16, map: dotTex, vertexColors: true,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true, toneMapped: false })));
  // links: nearest-neighbour web, brightness pulses along t
  const pairs = [];
  for (let i = 0; i < NN; i++) for (let j = i + 1; j < NN; j++)
    if (base[i].v.distanceTo(base[j].v) < 2.6) pairs.push([i, j]);
  const lpos = new Float32Array(pairs.length * 6), lcol = new Float32Array(pairs.length * 6);
  const lgeo = new THREE.BufferGeometry();
  lgeo.setAttribute('position', new THREE.BufferAttribute(lpos, 3));
  lgeo.setAttribute('color', new THREE.BufferAttribute(lcol, 3));
  scene.add(new THREE.LineSegments(lgeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true,
    opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })));
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.5, 0.5, 0.4));
  seekBg = (t) => {
    const intro = easeOut(clamp01(t / 0.8));
    camera.position.x = Math.sin(t * 0.11) * 1.4;
    camera.position.y = Math.cos(t * 0.09) * 0.8;
    camera.lookAt(0, 0, 0);
    for (let i = 0; i < NN; i++) {
      const b = base[i];
      pos[i*3]   = b.v.x + Math.sin(t * b.sp + b.ph) * 0.35;
      pos[i*3+1] = b.v.y + Math.cos(t * b.sp * 0.8 + b.ph) * 0.3;
      pos[i*3+2] = b.v.z + Math.sin(t * b.sp * 0.6 + b.ph * 2) * 0.3;
    }
    pgeo.attributes.position.needsUpdate = true;
    for (let k = 0; k < pairs.length; k++) {
      const [i, j] = pairs[k];
      for (let a = 0; a < 3; a++) { lpos[k*6+a] = pos[i*3+a]; lpos[k*6+3+a] = pos[j*3+a]; }
      const pulse = (0.10 + 0.16 * Math.max(0, Math.sin(t * 1.6 + i * 0.7))) * intro;
      for (let a = 0; a < 3; a++) { lcol[k*6+a] = col[i*3+a] * pulse; lcol[k*6+3+a] = col[j*3+a] * pulse; }
    }
    lgeo.attributes.position.needsUpdate = true;
    lgeo.attributes.color.needsUpdate = true;
  };
}

composer.addPass(new OutputPass());
const grainPass = new ShaderPass(grainVignette(THREE, W, H, { grain: 0.02, vignette: 0.42 }));
composer.addPass(grainPass);

// ---- HUD overlay (DOM — captured composited over the canvas) ----
const $ = id => document.getElementById(id);
if (cfg.sig) $('sig').textContent = cfg.sig;
$('kicker').textContent = cfg.kicker || '';
const titleHTML = (cfg.title || '').replace(/\*\*(.+?)\*\*/g, '<span class="hl">$1</span>');
const lines = (cfg.lines || []).map(h => {
  const d = document.createElement('div'); d.className = 'ln'; d.innerHTML = h;
  $('lines').appendChild(d); return d;
});
if (cfg.counter) { $('counter').style.display = 'block'; $('counterlbl').style.display = 'block';
  $('counterlbl').textContent = cfg.counter.label || ''; }
const T_TITLE = 0.9, T_LINE = 0.55, STAG = 0.7, T_COUNT = 2.2;

window.__seek = (t) => {
  seekBg(t);
  grainPass.uniforms.uTime.value = t * 60.0;
  composer.render();
  const tp = easeOut(clamp01(t / T_TITLE));
  const n = Math.round(titleHTML.replace(/<[^>]+>/g, '').length * tp);
  let out = '', vis = 0, i = 0;
  while (i < titleHTML.length && vis < n) {
    if (titleHTML[i] === '<') { const j = titleHTML.indexOf('>', i); out += titleHTML.slice(i, j + 1); i = j + 1; }
    else { out += titleHTML[i]; i++; vis++; }
  }
  $('title').innerHTML = out + (tp < 1 && Math.floor(t * 3) % 2 ? '▌' : '');
  if (cfg.counter) {
    const cp = easeOut(clamp01((t - 0.4) / T_COUNT));
    const val = Math.round(cfg.counter.from + (cfg.counter.to - cfg.counter.from) * cp);
    $('counter').textContent = val.toLocaleString('en-US');
    if (cfg.counter.to === 0 && cp >= 1) $('counter').style.color = '#FF1744';
  }
  lines.forEach((ln, k) => {
    const lp = easeOut(clamp01((t - T_TITLE - 0.2 - k * STAG) / T_LINE));
    ln.style.opacity = lp; ln.style.transform = `translateY(${12 * (1 - lp)}px)`;
    ln.style.borderLeftColor = lp >= 1 ? '#FF1744' : '#3a0d1a';
  });
};
window.__seek(0);
window.__ready = true;
</script>
</body>
</html>
