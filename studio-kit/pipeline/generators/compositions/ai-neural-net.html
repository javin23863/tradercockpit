<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: #05060e; overflow: hidden; }
  canvas { display: block; }
</style>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
</head>
<body>
<script type="module">
// AI-NEURAL-NET — a legible feed-forward neural network that THINKS: an activation wave sweeps input→output,
// nodes ignite layer by layer, and light pulses travel along the edges (the "signal flowing" read = unmistakably AI).
// Authored in Three.js, seeked by t for deterministic capture. Bloom-friendly (concentrated bright nodes on dark).
import * as THREE from './three.module.js';
import { grainVignette } from './mg-core.js';
import { EffectComposer } from './jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from './jsm/postprocessing/UnrealBloomPass.js';
import { OutputPass } from './jsm/postprocessing/OutputPass.js';
import { ShaderPass } from './jsm/postprocessing/ShaderPass.js';

const W = 1080, H = 1920, DUR = 6;
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: false });
renderer.setSize(W, H); renderer.setPixelRatio(1); renderer.setClearColor(0x05060e, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05060e, 0.085);
const camera = new THREE.PerspectiveCamera(46, W / H, 0.1, 100);

// composer: Render → moderate bloom (discrete bright nodes glow, don't wash) → Output → grain/vignette finisher
const composer = new EffectComposer(renderer);
composer.setSize(W, H);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(W, H), 0.78, 0.85, 0.22); // strength, radius, threshold
composer.addPass(bloom);
composer.addPass(new OutputPass());
const grainPass = new ShaderPass(grainVignette(THREE, W, H, { grain: 0.02, vignette: 0.42 }));
composer.addPass(grainPass);

// ---- soft circular sprite ----
function softDot() {
  const s = 64, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.6, 'rgba(255,255,255,0.2)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true; return tex;
}
const dotTex = softDot();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd = mulberry32(7720260624);

// ---- build a feed-forward net: layers bottom(input) → top(output) ----
const LAYERS = [6, 10, 10, 8, 4];
const Y_SPAN = 3.15, X_SPAN = 1.62;
const nodes = []; const layerIdx = [];
for (let L = 0; L < LAYERS.length; L++) {
  const n = LAYERS[L];
  const y = -Y_SPAN + (L / (LAYERS.length - 1)) * (2 * Y_SPAN);
  const ny = L / (LAYERS.length - 1); // 0 bottom .. 1 top
  const row = [];
  for (let i = 0; i < n; i++) {
    const x = n === 1 ? 0 : (-X_SPAN + (i / (n - 1)) * (2 * X_SPAN));
    const z = (rnd() - 0.5) * 0.5;
    row.push(nodes.length);
    nodes.push({ x, y: y + (rnd() - 0.5) * 0.12, z, ny, layer: L, hub: (L === 0 || L === LAYERS.length - 1) });
  }
  layerIdx.push(row);
}
// ---- fully-connected edges between consecutive layers ----
const edges = [];
for (let L = 0; L < LAYERS.length - 1; L++)
  for (const a of layerIdx[L]) for (const b of layerIdx[L + 1]) edges.push({ a, b, ny: (nodes[a].ny + nodes[b].ny) / 2 });

const COL_IDLE = [0.26, 0.20, 0.78];   // violet
const COL_HOT  = [0.55, 0.98, 1.0];    // cyan-white
const COL_EDGE = [0.13, 0.10, 0.40];   // dim violet edge
const COL_PULSE = [0.45, 0.95, 1.0];   // bright cyan signal

// node points
const npos = new Float32Array(nodes.length * 3), ncol = new Float32Array(nodes.length * 3), nsz = new Float32Array(nodes.length);
nodes.forEach((n, k) => { npos[k*3]=n.x; npos[k*3+1]=n.y; npos[k*3+2]=n.z; nsz[k] = n.hub ? 0.40 : 0.30; });
const ng = new THREE.BufferGeometry();
ng.setAttribute('position', new THREE.BufferAttribute(npos, 3));
ng.setAttribute('color', new THREE.BufferAttribute(ncol, 3));
const nodePts = new THREE.Points(ng, new THREE.PointsMaterial({ size: 0.34, map: dotTex, vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true }));
scene.add(nodePts);

// edge lines
const lpos = new Float32Array(edges.length * 6), lcol = new Float32Array(edges.length * 6);
edges.forEach((e, k) => {
  const a = nodes[e.a], b = nodes[e.b];
  lpos[k*6]=a.x; lpos[k*6+1]=a.y; lpos[k*6+2]=a.z; lpos[k*6+3]=b.x; lpos[k*6+4]=b.y; lpos[k*6+5]=b.z;
});
const lg = new THREE.BufferGeometry();
lg.setAttribute('position', new THREE.BufferAttribute(lpos, 3));
lg.setAttribute('color', new THREE.BufferAttribute(lcol, 3));
const lines = new THREE.LineSegments(lg, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
scene.add(lines);

// traveling signal pulses — one per edge, riding from lower node → upper node
const ppos = new Float32Array(edges.length * 3), pcol = new Float32Array(edges.length * 3);
const pg = new THREE.BufferGeometry();
pg.setAttribute('position', new THREE.BufferAttribute(ppos, 3));
pg.setAttribute('color', new THREE.BufferAttribute(pcol, 3));
const pulsePts = new THREE.Points(pg, new THREE.PointsMaterial({ size: 0.22, map: dotTex, vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true }));
scene.add(pulsePts);
const edgePhase = edges.map(() => rnd());

const clamp01 = x => Math.max(0, Math.min(1, x));
const easeOut = x => 1 - Math.pow(1 - x, 3);
const CYCLE = 2.55;           // seconds for the activation wave to sweep input→output
// activation: a gaussian band at the wavefront, with a soft trailing glow (energy moving up)
function nodeAct(ny, t) {
  const wf = ((t % CYCLE) / CYCLE) * 1.18 - 0.09; // wavefront in normalized-y, slight over-travel
  const d = ny - wf;
  const lead = Math.exp(-(d * d) / (2 * 0.05 * 0.05));        // sharp front
  const trail = d < 0 ? Math.exp(-(d * d) / (2 * 0.16 * 0.16)) * 0.45 : 0; // soft trail below
  return Math.min(1, lead + trail);
}

window.__seek = (t) => {
  const intro = easeOut(clamp01(t / 1.1)); // whole net fades+settles in over first ~1.1s

  // nodes
  for (let k = 0; k < nodes.length; k++) {
    const n = nodes[k];
    const act = nodeAct(n.ny, t);
    const base = (n.hub ? 0.34 : 0.22) * intro;
    const g = base + act * 1.15 * intro;
    ncol[k*3]   = COL_IDLE[0] * base + (COL_HOT[0] - COL_IDLE[0]) * act * intro + COL_HOT[0] * act * 0.4 * intro;
    ncol[k*3+1] = COL_IDLE[1] * base + (COL_HOT[1] - COL_IDLE[1]) * act * intro + COL_HOT[1] * act * 0.4 * intro;
    ncol[k*3+2] = COL_IDLE[2] * base + (COL_HOT[2] - COL_IDLE[2]) * act * intro + COL_HOT[2] * act * 0.4 * intro;
  }
  ng.attributes.color.needsUpdate = true;

  // edges + pulses
  for (let k = 0; k < edges.length; k++) {
    const e = edges[k], a = nodes[e.a], b = nodes[e.b];
    const actA = nodeAct(a.ny, t), actB = nodeAct(b.ny, t);
    const flow = Math.max(actA, actB);
    const eb = intro * (0.10 + flow * 0.85);
    const r = COL_EDGE[0] * intro + COL_PULSE[0] * flow * 0.5 * intro;
    const g = COL_EDGE[1] * intro + COL_PULSE[1] * flow * 0.5 * intro;
    const bch = COL_EDGE[2] * intro + COL_PULSE[2] * flow * 0.5 * intro;
    for (const o of [0, 3]) { lcol[k*6+o] = r * eb * 2.4; lcol[k*6+o+1] = g * eb * 2.4; lcol[k*6+o+2] = bch * eb * 2.4; }

    // pulse rides the edge; brightest while this edge's lower node is firing
    const u = (t * 0.62 + edgePhase[k]) % 1;
    ppos[k*3]   = a.x + (b.x - a.x) * u;
    ppos[k*3+1] = a.y + (b.y - a.y) * u;
    ppos[k*3+2] = a.z + (b.z - a.z) * u;
    const pb = intro * actA * (0.35 + 0.65 * Math.sin(u * Math.PI)); // fade at endpoints
    pcol[k*3] = COL_PULSE[0] * pb; pcol[k*3+1] = COL_PULSE[1] * pb; pcol[k*3+2] = COL_PULSE[2] * pb;
  }
  lg.attributes.color.needsUpdate = true;
  pg.attributes.position.needsUpdate = true; pg.attributes.color.needsUpdate = true;

  // readable, slightly 3D: gentle sway + a small parallax tilt, slow push-in — net stays legible front-on
  const sway = Math.sin(t * 0.34) * 0.16;
  scene.rotation.y = sway;
  scene.rotation.x = Math.sin(t * 0.22 + 0.4) * 0.045;
  const radius = 8.0 - easeOut(clamp01(t / DUR)) * 0.7;
  camera.position.set(Math.sin(sway * 0.4) * 0.6, 0.0, radius);
  camera.lookAt(0, 0, 0);

  grainPass.uniforms.uTime.value = t * 60.0;
  composer.render();
};

window.__seek(0);
window.__ready = true;
</script>
</body>
</html>
