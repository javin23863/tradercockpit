<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style> html, body { margin: 0; padding: 0; background: #04050c; overflow: hidden; } canvas { display: block; } </style>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
</head>
<body>
<script type="module">
// DATA CORRIDOR — flying FORWARD through a tunnel of glowing rings (a data/time corridor). 5th distinct form — forward
// flight, not orbital. Bloom on the ring edges + ACES. Maps to "agents work through the night". Deterministic seek-capture.
import * as THREE from './three.module.js';
import { mulberry32, clamp01, easeOut, mix3, grainVignette, PAL } from './mg-core.js';
import { EffectComposer } from './jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from './jsm/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from './jsm/postprocessing/ShaderPass.js';
import { OutputPass } from './jsm/postprocessing/OutputPass.js';

const W = 1080, H = 1920, DUR = 6;
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H); renderer.setPixelRatio(1); renderer.setClearColor(0x04050c, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 0.9; renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x04050c, 0.028);
const camera = new THREE.PerspectiveCamera(48, W / H, 0.1, 120);
const rnd = mulberry32(27182818);

const composer = new EffectComposer(renderer);
composer.setSize(W, H);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.4, 0.45, 0.35)); // strength, radius, threshold
composer.addPass(new OutputPass());
// finishing pass (LAST): vignette + grain + triangular dither → band-free dark gradient (grain low per file-size caveat)
const grainPass = new ShaderPass(grainVignette(THREE, W, H, { grain: 0.022, vignette: 0.4 }));
composer.addPass(grainPass);

// ---- the corridor: thin glowing torus rings strung along -z ----
const N = 34, RANGE = 56, CAMZ = 6;
const rings = [];
for (let i = 0; i < N; i++) {
  const R = 2.3 + 0.55 * Math.sin(i * 1.27) + (rnd() - 0.5) * 0.2;
  const geo = new THREE.TorusGeometry(R, 0.055 + rnd() * 0.02, 8, 80);
  const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(0, 0, 0), toneMapped: false }); // normal+depth = tunnel occlusion, not additive wash
  const m = new THREE.Mesh(geo, mat);
  scene.add(m);
  rings.push({ m, mat, baseZ: (i / N) * RANGE, twist: i * 0.42, hue: i * 0.6 });
}

// ---- axial streak particles for speed/depth ----
const NP = 700;
const pbase = new Float32Array(NP * 3), pcol = new Float32Array(NP * 3), ppos = new Float32Array(NP * 3), pz = new Float32Array(NP);
for (let i = 0; i < NP; i++) {
  const a = rnd() * Math.PI * 2, rr = 0.4 + rnd() * 2.6;
  pbase[i*3] = Math.cos(a) * rr; pbase[i*3+1] = Math.sin(a) * rr; pz[i] = rnd() * RANGE;
  const c = rnd() > 0.5 ? PAL.violet : PAL.cyan; const d = 0.3 + rnd() * 0.5;
  pcol[i*3] = c[0]*d; pcol[i*3+1] = c[1]*d; pcol[i*3+2] = c[2]*d;
}
const pgeo = new THREE.BufferGeometry();
pgeo.setAttribute('position', new THREE.BufferAttribute(ppos, 3));
pgeo.setAttribute('color', new THREE.BufferAttribute(pcol, 3));
const dotTex = (() => { const s=32,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);gr.addColorStop(0,'#fff');gr.addColorStop(0.5,'rgba(255,255,255,0.3)');gr.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=gr;g.fillRect(0,0,s,s);const tx=new THREE.CanvasTexture(c);tx.needsUpdate=true;return tx;})();
scene.add(new THREE.Points(pgeo, new THREE.PointsMaterial({ size: 0.12, map: dotTex, vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true, toneMapped: false })));

const VIOLET = PAL.violet, CYAN = PAL.cyan;
window.__seek = (t) => {
  const intro = easeOut(clamp01(t / 0.6));
  // forward flight: camera holds on-axis with a gentle drift + bank; the world streams toward it
  const dx = Math.sin(t * 0.32) * 0.35, dy = Math.cos(t * 0.27) * 0.28;
  camera.position.set(dx, dy, CAMZ);
  camera.lookAt(dx * 0.4, dy * 0.4, -60);
  camera.rotation.z = Math.sin(t * 0.22) * 0.07;
  for (const r of rings) {
    const phase = (((r.baseZ - t * 10) % RANGE) + RANGE) % RANGE;  // 0 near → RANGE far
    r.m.position.z = (CAMZ - 2) - phase;
    r.m.rotation.z = r.twist + t * 0.16;
    const near = 1 - clamp01(phase / RANGE);
    const fade = clamp01((RANGE - phase) / (RANGE * 0.16)) * clamp01((phase - 2.0) / 9.0); // fade in far + dim the frame-filling nearest rings
    const pulse = 0.62 + 0.38 * Math.sin(phase * 0.42 - t * 2.2);
    const b = (0.12 + near * near * 1.3) * fade * pulse * intro;       // steep falloff → only the nearest rings glow, dark between
    const m = 0.5 + 0.5 * Math.sin(r.hue + t * 0.3);
    const c = mix3(VIOLET, CYAN, m);
    r.mat.color.setRGB(c[0] * b, c[1] * b, c[2] * b);
  }
  for (let i = 0; i < NP; i++) {
    const phase = (((pz[i] - t * 10) % RANGE) + RANGE) % RANGE;
    const z = (CAMZ - 2) - phase;
    ppos[i*3] = pbase[i*3]; ppos[i*3+1] = pbase[i*3+1]; ppos[i*3+2] = z;
  }
  pgeo.attributes.position.needsUpdate = true;
  grainPass.uniforms.uTime.value = t * 60.0;
  composer.render();
};
window.__seek(0);
window.__ready = true;
</script>
</body>
</html>
