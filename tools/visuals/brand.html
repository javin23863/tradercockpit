<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
:root{--bg:#08030a;--ink:#F5E8EA;--dim:#c89aa3;--faint:#7a4a52;--accent:#FF1744;--line:#3a0d1a}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:"Cascadia Mono",Consolas,monospace;color:var(--ink)}
.grid{position:absolute;inset:0;opacity:.4;
  background-image:linear-gradient(rgba(58,13,26,.5) 1px,transparent 1px),
  linear-gradient(90deg,rgba(58,13,26,.5) 1px,transparent 1px)}
.vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.75) 100%)}

/* AVATAR 800x800: crimson ring + TC */
#avatar{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
#avatar .ring{width:560px;height:560px;border:14px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 90px rgba(255,23,68,.55),inset 0 0 60px rgba(255,23,68,.25);position:relative}
#avatar .ring::before{content:"";position:absolute;inset:-40px;border:2px solid rgba(255,23,68,.3);border-radius:50%}
#avatar .tc{font-size:220px;font-weight:700;letter-spacing:-.05em;
  text-shadow:0 0 50px rgba(255,23,68,.5)}
#avatar .tc span{color:var(--accent)}

/* BANNER 2560x1440, safe area = centered 1546x423 */
#banner{position:absolute;inset:0;display:none}
#banner .safe{position:absolute;left:507px;top:508px;width:1546px;height:423px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
#banner .name{font-size:92px;font-weight:700;letter-spacing:.06em}
#banner .name span{color:var(--accent);text-shadow:0 0 40px rgba(255,23,68,.6)}
#banner .tag{font-size:34px;color:var(--dim);margin-top:14px}
#banner .tag b{color:var(--accent)}
#banner .sub{font-size:22px;color:var(--faint);margin-top:18px;letter-spacing:.35em;text-transform:uppercase}
#banner .phases{position:absolute;left:0;right:0;top:200px;text-align:center;font-size:20px;
  color:rgba(122,74,82,.5);letter-spacing:.8em;white-space:nowrap}
#banner .phases2{top:auto;bottom:200px}

/* WATERMARK 150x150 */
#wm{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
#wm .box{width:120px;height:120px;border:4px solid var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:700;
  background:rgba(8,3,10,.85)}
#wm .box span{color:var(--accent)}
</style>
</head>
<body>
<div class="grid"></div>
<div id="avatar"><div class="ring"><div class="tc">T<span>C</span></div></div></div>
<div id="banner">
  <div class="phases">01 · 02 · 03 · 04 · 05 · 06 · 07 · 08 · 09 · 10 · 11 · 12</div>
  <div class="safe">
    <div class="name">TRADER<span>COCKPIT</span></div>
    <div class="tag">most strategies <b>die here</b>. that's the point.</div>
    <div class="sub">12-phase gauntlet · receipts only · 0 validated on purpose</div>
  </div>
  <div class="phases phases2">MC SHUFFLE · WALK-FORWARD · COST ×3 · DEFLATED SHARPE</div>
</div>
<div id="wm"><div class="box">T<span>C</span></div></div>
<div class="vig"></div>
<script>
const mode = new URLSearchParams(location.search).get("m") || "avatar";
document.getElementById(mode).style.display = "flex";
</script>
</body>
</html>
