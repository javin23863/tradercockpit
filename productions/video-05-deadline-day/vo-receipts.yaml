"01":
  - quote: >-
      One minute past midnight Eastern, the last legal Iranian barrel cleared the books. The Treasury waiver that let in-process oil deals finish winds down today, July seventeenth.
    claim: clm-ofac-waiver-2026-07-07
  - quote: >-
      And the market spent yesterday selling the best chip earnings ever printed — TSMC grew profit seventy-seven point four percent and the stock still closed down two point three two percent.
    claim: clm-tsmc-q2-2026-07-16
  - quote: >-
      Energy closed on its highs while the Nasdaq one hundred broke the exact support named in yesterday's video.
    claim: clm-continuity-video04-2026-07-16
  - quote: >-
      My read: this is rotation — money leaving the growth engine that stopped responding to good news, and moving toward the sector with a policy floor under it. Today we watch that rotation either finish the job or fail, at six very specific numbers.
    claim: clm-analysis-rotation-2026-07-17

"02":
  - quote: >-
      On July seventh, after Revolutionary Guard attacks on three tankers in the Strait of Hormuz, Treasury revoked General License X — the waiver from the interim deal that had allowed Iranian oil sales. Its replacement, X one, authorized nothing new. It only let transactions already in process wind down, and that window closes today, July seventeenth. Even the money from those final sales does not move freely — it lands in a blocked, interest-bearing account.
    claim: clm-ofac-waiver-2026-07-07
  - quote: >-
      It means that from tonight, there is no legal path for an Iranian barrel and no legal path for the cash either.
    claim: clm-ofac-waiver-2026-07-07
  - quote: >-
      Al Jazeera reported on July tenth that shipping through the strait ground to a halt as the fighting resumed, and the naval blockade came back into force on July fourteenth.
    claim: clm-hormuz-halt-2026-07-10
    attributed: true

"03":
  - quote: >-
      TSMC reported its second quarter on July sixteenth: net income of seven hundred six point five six billion Taiwan dollars, up seventy-seven point four percent from a year earlier. Revenue up thirty-six percent. Earnings per share of twenty-seven point two five Taiwan dollars. Gross margin sixty-seven point seven percent.
    claim: clm-tsmc-q2-2026-07-16
  - quote: >-
      If you had shown those numbers to anyone a year ago and asked what the stock would do, nobody says down.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      The market's answer: the stock closed down two point three two percent at four hundred nine seventy-four, and chip stocks fell for a second straight day.
    claim: clm-chart-tsm-2026-07-17
  - quote: >-
      Alphabet lost more than four percent the same session after Bloomberg reported a delay to Gemini three point five Pro. The session totals: Dow down two tenths of a percent, S and P five hundred down half a percent, Nasdaq down one and a half.
    claim: clm-session-2026-07-16
    attributed: true

"04":
  - quote: >-
      Pull up TSM daily and zoom out first, because the damage has a shape. This month's high was four seventy-nine. Yesterday's close at four oh-nine seventy-four puts the stock about fourteen and a half percent below that high — while the company was printing seventy-seven percent profit growth.
    claim: clm-chart-tsm-2026-07-17
  - quote: >-
      Somebody large is using every bounce to leave, and they have been at it for weeks, not days.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      Now zoom back in to the week. The floor is four oh-three fifty — it traded down to that price three separate times this week and held every time. Three touches makes it a real level; the market has voted on it. Yesterday's close, four oh-nine seventy-four, sits just above it. Overhead, there's a shelf of closes packed between four nineteen and four twenty-one, so four twenty is the lid. That's a six-dollar box between the floor and yesterday's close, and a ten-dollar ceiling — the stock is compressed, and compression at a triple-tested floor resolves violently in whichever direction wins.
    claim: clm-chart-tsm-2026-07-17
  - quote: >-
      Here's the part that matters this morning. The overnight session indicated three ninety-seven fifty-three. That is under the floor. An overnight print is an early vote — the decision comes from the completed daily bar.
    claim: clm-chart-tsm-2026-07-17
  - quote: >-
      If TSM finishes today below four oh-three fifty, the strongest balance sheet in the chip complex has lost its week-long floor the day after a record quarter, and the pressure should spread through the group. If buyers defend it again, the floor gets a fourth touch and the lid at four twenty is the next test. Fourth touches are where the story usually ends, one way or the other — floors that get hit that often either become launch pads or trapdoors.
    claim: clm-chart-tsm-2026-07-17

"05":
  - quote: >-
      The Nasdaq one hundred already made its choice. In yesterday's video the repair level was twenty-nine thousand five hundred two point six — Wednesday's close. Yesterday it finished at twenty-nine thousand twenty-five point seven seven, below that line. Zoom out and the slide has scale: the July high was thirty thousand six hundred forty-two, so the index now sits about five and a quarter percent below it. That's a leadership index giving back a month of work in under two weeks.
    claim: clm-chart-ndx-2026-07-17
  - quote: >-
      Next support is twenty-eight thousand eight hundred fourteen point five seven, the July floor that has held twice. Yesterday's low stopped at twenty-eight thousand eight hundred eighty-one — about sixty-six points above that floor.
    claim: clm-chart-ndx-2026-07-17
  - quote: >-
      Lose twenty-eight eight fourteen on a completed bar and the June range below opens up, and the rotation story gains a second act.
    claim: clm-chart-ndx-2026-07-17
  - quote: >-
      Four highs in nine sessions between seventy-five seventy and seventy-five eighty-one fifty.
    claim: clm-chart-spx-2026-07-17
  - quote: >-
      The week's floor is seventy-five oh-four oh-two, and yesterday's session low landed exactly there before the close came back to seventy-five thirty-three. The whole nine-session range is barely one percent wide, while the Nasdaq broke down inside it. For scale, the index sits about three and a quarter percent above its July low at seventy-two ninety-four, so the uptrend's cushion is intact.
    claim: clm-chart-spx-2026-07-17
  - quote: >-
      If the S and P loses seventy-five oh-four, the rotation read gets dropped entirely — that would be distribution.
    claim: clm-analysis-rotation-2026-07-17

"06":
  - quote: >-
      Where is the money going? Watch the two energy charts.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      X L E closed at fifty-seven oh-two, up nine tenths of a percent — its first close ever above the old fifty-six fifty ceiling in this range. And look at the shape of yesterday's bar, because it is a textbook retest: it opened at fifty-six sixty-six, dipped only to fifty-six fifty-nine — it never even touched the old ceiling — and finished near the top of the day.
    claim: clm-chart-xle-2026-07-17
  - quote: >-
      Zoom out two weeks and the rotation is even clearer: this fund has climbed from a low near fifty-two sixty to fifty-seven, better than eight percent, in the same stretch the chip complex was bleeding. It tagged fifty-seven thirty twice this week and got rejected both times — two rejections at the same price is the market drawing you the trigger line. So the setup is clean: a daily close above fifty-seven thirty and this is a breakout with a policy deadline behind it. Fail back under fifty-six fifty and the whole move was a head fake, and you will hear that admission on the next chart, not an excuse.
    claim: clm-chart-xle-2026-07-17
  - quote: >-
      Brent, on the live July seventeenth bar, has traded eighty-three seventy-one to eighty-five fifty and sits near eighty-four forty-three — below eighty-seven fifty-five, the spike high from the strike week that nothing has touched since. Zoom out and you see what that premium is worth: crude ran from about seventy-one to eighty-seven fifty-five when the strait shut, a twenty-three percent repricing in days, and it has surrendered very little of it since. The shelf underneath is eighty-three thirty-one — the close that started the whole move.
    claim: clm-chart-brent-2026-07-17
  - quote: >-
      Deadline day, empty strait, and crude is holding the middle of its range. The premium is in the price. Whether it grows is decided at eighty-seven fifty-five, and only there. And if eighty-three thirty-one gives way while ships start moving again, that same twenty-three percent tells you exactly how much air is underneath.
    claim: clm-chart-brent-2026-07-17

"07":
  - quote: >-
      One quiet number ties the whole board together. The ten-year Treasury yield closed at four point five three, down from four point five six, drifting away from its July high at four point six four. The month's full range runs four point three six to four point six four — twenty-eight basis points, which is a calm bond market by this year's standards. The floor that has held twice this month is four point four five.
    claim: clm-chart-us10y-2026-07-17
  - quote: >-
      While the ten-year sits in that band, the rotation math holds: yields high enough to pressure long-duration tech, stable enough that nothing breaks. A break below four point four five would say the bond market smells slowdown, and that re-prices every chart in this video. Four forty-five. Circle it.
    claim: clm-chart-us10y-2026-07-17

"08":
  - quote: >-
      So let me put the whole board into one playbook for the next two sessions, because the six numbers only matter in combination.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      Case one — rotation completes. X L E closes above fifty-seven thirty while the S and P holds above seventy-five oh-four. That is the market saying the deadline premium is being paid, and paid from tech's pocket. In that world, TSM below four oh-three fifty is pressure, and the Nasdaq drifting toward twenty-eight eight fourteen is rotation doing its job while the broad index stays calm.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      Case two — rotation fails quietly. X L E slips back under fifty-six fifty while the Nasdaq reclaims twenty-nine five oh-two. Then the breakout was a head fake, the chip selling was a two-day shakeout, and the whole story collapses back into a single oil range trade between eighty-three thirty-one and eighty-seven fifty-five. That outcome would be admitted here in plain language the very next session.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      Case three — this stops being rotation. The S and P closes below seventy-five oh-four while the ten-year breaks four point four five. Falling yields plus a broken band is not money moving between sectors — that is money leaving. Every constructive read in this video is conditional on the referee holding, and the referee is a number, not an opinion.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      No case gets a prediction attached. The completed bars pick the case, and the levels were named before the fact — that is the entire discipline this desk runs on.
    claim: clm-analysis-rotation-2026-07-17

"09":
  - quote: >-
      Deadline day in one breath. The last legal Iranian barrel is done at midnight, and even the cash sits frozen. The chip complex sold a record quarter, and TSM's floor at four oh-three fifty is already being tested from underneath. Energy is one close above fifty-seven thirty away from a breakout that has a government calendar behind it. The Nasdaq needs twenty-nine five oh-two back to call off the alarm. The S and P referee holds the whole read together above seventy-five oh-four, and the bond market stays quiet above four forty-five.
    claim: clm-analysis-rotation-2026-07-17
  - quote: >-
      Six numbers. No predictions. The completed bars decide, and whichever way they print, the next chart walks through it with you tomorrow. If a daily desk that talks in levels and dates is useful to you, subscribe — it costs you a click and it keeps the lights on. See you at the close.
    claim: clm-analysis-rotation-2026-07-17
