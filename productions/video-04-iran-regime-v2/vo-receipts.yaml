"07":
  - quote: >-
      First, danger around a major shipping route raises the cost and uncertainty of moving cargo. That can mean insurance, freight, delays, rerouting, and compliance checks. Second, those costs can raise the delivered price of energy and products even before a refinery loses supply. Third, higher delivered-energy risk makes the inflation and rate path less comfortable.
    claim: clm-market-mechanism-2026-07-16

"08":
  - quote: >-
      Brent moved from seventy-five twenty-two on July tenth to eighty-three thirty-one on July thirteenth. It reached eighty-seven fifty-five the next day.
    claim: clm-chart-brent-2026-07-16
  - quote: >-
      Today's official shipping update is serious, but Brent was still below Wednesday's close at the cutoff.
    claim: clm-imo-incidents-2026-07-16

"09":
  - quote: >-
      Base case: elevated route risk, selective market pressure, no fresh oil breakout. Brent holds between eighty-three thirty-one and eighty-seven fifty-five. X L E holds between fifty-six fifty and fifty-seven thirty. VIX stays below seventeen fifty-six.
    claim: clm-scenario-map-2026-07-16
  - quote: >-
      Escalation case: an official source reports more navigation disruption, additional vessel damage, or lost supply. Then I want price alignment: Brent closes above eighty-seven fifty-five, X L E clears fifty-seven thirty, and VIX clears seventeen fifty-six.
    claim: clm-scenario-map-2026-07-16
  - quote: >-
      Relief case: an official source reports safer passage or real de-escalation. Then Brent closes below eighty-three thirty-one, X L E loses fifty-six fifty, and the Nasdaq one hundred recovers the prior close at twenty-nine thousand five hundred two point six.
    claim: clm-scenario-map-2026-07-16

