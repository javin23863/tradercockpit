"01":
  - quote: >-
      The International Maritime Organization's register now lists fifty-seven incidents in the region as of July sixteenth, and its newest entry is another damaged vessel near Iran.
    claim: clm-imo-incidents-2026-07-16
  - quote: >-
      But Brent was around eighty-four forty-seven on the live daily bar, below yesterday's close. Energy stocks were green, the Nasdaq one hundred was down about one point three percent, and the VIX was only sixteen.
    claim: clm-chart-brent-2026-07-16
  - quote: >-
      My read is straightforward. The war risk is real. Today's tape is not adding another clean oil breakout. It is showing up more clearly in tech, rates, and the dollar.
    claim: clm-market-mechanism-2026-07-16

"02":
  - quote: >-
      Bloomberg's current Iran coverage is centered on a widening conflict, ships avoiding Hormuz, and the consequences for oil.
    claim: clm-bloomberg-iran-frame-2026-07-16
  - quote: >-
      Al Jazeera reported that the renewed U.S. blockade of vessels moving to and from Iranian ports took effect at twenty hundred GMT on Tuesday. The same report said CENTCOM announced a new wave of strikes aimed at capabilities used to attack commercial shipping in the strait.
    claim: clm-aj-blockade-strikes-2026-07-14
  - quote: >-
      As of July sixteenth, it lists fifty-seven incidents and eighteen seafarer fatalities across the region. The newest entry is the BELMA, damaged near Bushehr Province on July fifteenth, with no pollution reported.
    claim: clm-imo-incidents-2026-07-16
  - quote: >-
      Treasury sanctioned seven people and entities on Wednesday for supporting weapons procurement for the IRGC. A day earlier it expanded pressure on a large oil, shipping, and finance network.
    claim: clm-treasury-irgc-procurement-2026-07-15

"03":
  - quote: >-
      July tenth closed at seventy-five twenty-two. July thirteenth closed at eighty-three thirty-one. That was a ten point seven five percent jump in one completed session. On July fourteenth, Brent traded as high as eighty-seven fifty-five and closed at eighty-five fifteen. Wednesday closed almost flat at eighty-five oh-seven.
    claim: clm-chart-brent-2026-07-16
  - quote: >-
      On the live July sixteenth bar, Brent opened at eighty-five thirty-four, traded up to eighty-six twenty-five, down to eighty-three eighty-three, and was around eighty-four forty-seven at the cutoff.
    claim: clm-chart-brent-2026-07-16
  - quote: >-
      Eighty-seven fifty-five is the breakout level overhead. Eighty-three thirty-one is the completed support, with today's live low at eighty-three eighty-three sitting just above it.
    claim: clm-chart-brent-2026-07-16

"04":
  - quote: >-
      X L E closed Wednesday at fifty-six fifty. On the live Thursday bar it was around fifty-six ninety-six, up about eight tenths of one percent, after trading as high as fifty-seven thirty.
    claim: clm-chart-xle-2026-07-16
  - quote: >-
      That matters because crude and producers are not giving the same intraday answer. Brent was lower; the energy fund was higher.
    claim: clm-market-mechanism-2026-07-16
  - quote: >-
      For that, I want Brent through eighty-seven fifty-five and X L E through fifty-seven thirty on completed bars.
    claim: clm-scenario-map-2026-07-16
  - quote: >-
      If X L E loses that level while Brent loses eighty-three thirty-one, the energy bid is weakening with the barrel.
    claim: clm-scenario-map-2026-07-16

