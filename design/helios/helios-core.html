<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HELIOS CORE — native procedural reference v26</title>
<style>
  html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const glOpts = { antialias:false, alpha:false, powerPreference:'high-performance' };
const gl = canvas.getContext('webgl2', glOpts) || canvas.getContext('webgl', glOpts);

const VS = `
attribute vec2 a;
void main(){ gl_Position = vec4(a,0.,1.); }
`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_pointer;
uniform float u_motion;

/* ---------- 4D simplex noise (Ashima / Stefan Gustavson, MIT) ---------- */
vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
float mod289(float x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
float permute(float x){ return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
float taylorInvSqrt(float r){ return 1.79284291400159 - 0.85373472095314 * r; }
vec4 grad4(float j, vec4 ip){
  const vec4 ones = vec4(1.0,1.0,1.0,-1.0);
  vec4 p,s;
  p.xyz = floor( fract (vec3(j) * ip.xyz) * 7.0) * ip.z - 1.0;
  p.w = 1.5 - dot(abs(p.xyz), ones.xyz);
  s = vec4(lessThan(p, vec4(0.0)));
  p.xyz = p.xyz + (s.xyz*2.0 - 1.0) * s.www;
  return p;
}
#define F4 0.309016994374947451
float snoise(vec4 v){
  const vec4 C = vec4(0.138196601125011, 0.276393202250021, 0.414589803375032, -0.447213595499958);
  vec4 i  = floor(v + dot(v, vec4(F4)) );
  vec4 x0 = v - i + dot(i, C.xxxx);
  vec4 i0;
  vec3 isX = step( x0.yzw, x0.xxx );
  vec3 isYZ = step( x0.zww, x0.yyz );
  i0.x = isX.x + isX.y + isX.z;
  i0.yzw = 1.0 - isX;
  i0.y += isYZ.x + isYZ.y;
  i0.zw += 1.0 - isYZ.xy;
  i0.z += isYZ.z;
  i0.w += 1.0 - isYZ.z;
  vec4 i3 = clamp( i0, 0.0, 1.0 );
  vec4 i2 = clamp( i0-1.0, 0.0, 1.0 );
  vec4 i1 = clamp( i0-2.0, 0.0, 1.0 );
  vec4 x1 = x0 - i1 + C.xxxx;
  vec4 x2 = x0 - i2 + C.yyyy;
  vec4 x3 = x0 - i3 + C.zzzz;
  vec4 x4 = x0 + C.wwww;
  i = mod289(i);
  float j0 = permute( permute( permute( permute(i.w) + i.z) + i.y) + i.x);
  vec4 j1 = permute( permute( permute( permute (
            i.w + vec4(i1.w, i2.w, i3.w, 1.0 ))
          + i.z + vec4(i1.z, i2.z, i3.z, 1.0 ))
          + i.y + vec4(i1.y, i2.y, i3.y, 1.0 ))
          + i.x + vec4(i1.x, i2.x, i3.x, 1.0 ));
  vec4 ip = vec4(1.0/294.0, 1.0/49.0, 1.0/7.0, 0.0);
  vec4 p0 = grad4(j0,   ip);
  vec4 p1 = grad4(j1.x, ip);
  vec4 p2 = grad4(j1.y, ip);
  vec4 p3 = grad4(j1.z, ip);
  vec4 p4 = grad4(j1.w, ip);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  p4 *= taylorInvSqrt(dot(p4,p4));
  vec3 m0 = max(0.6 - vec3(dot(x0,x0), dot(x1,x1), dot(x2,x2)), 0.0);
  vec2 m1 = max(0.6 - vec2(dot(x3,x3), dot(x4,x4)), 0.0);
  m0 = m0*m0; m1 = m1*m1;
  return 49.0 * ( dot(m0*m0, vec3(dot(p0,x0), dot(p1,x1), dot(p2,x2)))
                + dot(m1*m1, vec2(dot(p3,x3), dot(p4,x4))) );
}

float fbm(vec4 q){
  float a = 0.5, s = 0.0;
  for(int i=0;i<5;i++){ s += a*snoise(q); q.xyz *= 2.03; q.w *= 1.35; a *= 0.5; }
  return s;
}
float fbm3(vec4 q){
  float a = 0.5, s = 0.0;
  for(int i=0;i<3;i++){ s += a*snoise(q); q.xyz *= 2.11; q.w *= 1.3; a *= 0.5; }
  return s;
}

/* ---------- 3D voronoi (F1, F2) with drifting cell nuclei ---------- */
vec3 hash3(vec3 p){
  p = vec3(dot(p,vec3(127.1,311.7, 74.7)),
           dot(p,vec3(269.5,183.3,246.1)),
           dot(p,vec3(113.5,271.9,124.6)));
  return fract(sin(p)*43758.5453123);
}
vec2 voronoi(vec3 x, float t){
  vec3 n = floor(x); vec3 f = fract(x);
  float F1 = 8.0, F2 = 8.0;
  for(int k=-1;k<=1;k++)
  for(int j=-1;j<=1;j++)
  for(int i=-1;i<=1;i++){
    vec3 g = vec3(float(i),float(j),float(k));
    vec3 o = hash3(n+g);
    o = 0.5 + 0.42*sin(t + 6.2831*o);
    vec3 rr = g + o - f;
    float d = dot(rr,rr);
    if(d<F1){ F2=F1; F1=d; } else if(d<F2){ F2=d; }
  }
  return sqrt(vec2(F1,F2));
}

mat3 rotY(float a){ float c=cos(a), s=sin(a); return mat3(c,0.,-s, 0.,1.,0., s,0.,c); }
mat3 rotX(float a){ float c=cos(a), s=sin(a); return mat3(1.,0.,0., 0.,c,s, 0.,-s,c); }

float hash21(vec2 p){ return fract(sin(dot(p, vec2(41.31, 289.17)))*43758.5453); }
float wrapPi(float a){ return atan(sin(a),cos(a)); }
vec3 prominenceField(vec2 p,float t,float R){
  float r=length(p);
  if(r<R*0.94 || r>R*1.62) return vec3(0.0);
  float th=atan(p.y,p.x);
  vec3 c=vec3(0.0);
  for(int i=0;i<4;i++){
    float fi=float(i);
    float ang=-2.45+fi*1.63+0.15*sin(t*(0.045+0.008*fi)+fi*2.2);
    float da=wrapPi(th-ang);
    float span=0.20+0.035*sin(fi*2.7+0.8);
    float q=clamp(1.0-abs(da)/span,0.0,1.0);
    float arch=q*q*(3.0-2.0*q);
    float h=R*(0.105+0.145*(0.5+0.5*sin(t*(0.12+0.02*fi)+fi*1.9)));
    float target=R+h*arch;
    float width=R*(0.010+0.006*(1.0-arch));
    float line=exp(-abs(r-target)/max(width,0.0001))*smoothstep(0.0,0.14,q);
    float haze=exp(-abs(r-target)/max(width*4.5,0.0001))*arch;
    c += line*(0.72+0.28*sin(t*(0.95+0.15*fi)+da*34.0+fi))*vec3(1.0,0.58,0.16)*0.76;
    c += haze*vec3(0.72,0.12,0.018)*0.075;
  }
  float d=max(r-R,0.0);
  vec2 dir=r>0.0?p/r:vec2(1.0,0.0);
  float tongues=pow(max(fbm3(vec4(dir*6.8,4.1,t*0.08)),0.0),2.2);
  c += exp(-d/max(R*0.075,0.0001))*tongues*vec3(1.0,0.34,0.045)*0.16;
  return c;
}

void main(){
  vec2 frag = gl_FragCoord.xy;
  vec2 p = (frag - 0.5*u_res) / u_res.y;
  float t = u_time;

  float R = 0.30;
  float r = length(p);
  float px = 1.5 / u_res.y;

  vec3 col = vec3(0.0);

  /* =============== CORONA (all pixels) =============== */
  {
    float d = max(r - R, 0.0);
    vec2 dir = r > 0.0 ? p/r : vec2(1.0,0.0);
    /* radially-stretched wisps */
    float wisp  = fbm3(vec4(dir*2.6*(1.0 + d*1.2), 0.37, t*0.10));
    float wisp2 = fbm3(vec4(dir*1.3*(1.0 + d*0.6), 4.91, t*0.06));
    d *= 1.0 + 0.28*fbm3(vec4(dir*3.2, 1.7, t*0.05));
    float gT = exp(-d*100.0);            /* tight hot rim halo   */
    float gM = exp(-d*27.5);            /* mid orange           */
    float gW = exp(-d*9.5);             /* wide deep red        */
    vec3 corona = gT * vec3(1.00, 0.55, 0.18) * 1.55
                + gM * (0.75 + 0.25*wisp)  * vec3(1.00, 0.32, 0.05) * 0.36
                + gW * (0.60 + 0.30*wisp2) * vec3(0.45, 0.08, 0.010) * 0.07;
    float wispRay = pow(max(fbm3(vec4(dir*5.0, 8.2, t*0.04)), 0.0), 2.5);
    corona += exp(-d*13.0) * wispRay * vec3(1.0, 0.35, 0.07) * 0.30;
    /* hard fade so the frame corners are true black */
    corona *= 1.0 - smoothstep(R*1.52, R*2.47, r);
    col += corona;
  }
  col += prominenceField(p,t*u_motion,R);

  /* =============== ORBITAL GUIDE ARCS =============== */
  {
    for(int i=0;i<2;i++){
      float fi = float(i);
      float a2 = R*(1.38 + fi*0.30);
      float b2 = a2*0.42;
      float f2 = length(p/vec2(a2,b2));
      float dd = abs(f2-1.0)*b2;
      float th2 = atan(p.y/b2, p.x/a2);
      float dash = smoothstep(0.30, 0.80, 0.5 + 0.5*sin(th2*70.0 + fi*2.0 + t*0.10));
      float vis = smoothstep(-0.55, 0.25, sin(th2 + fi*2.6));
      col += exp(-dd*520.0)*dash*vis * vec3(1.0, 0.55, 0.20) * 0.15;
    }
  }

  /* =============== SPARK PARTICLES =============== */
  {
    for(int L=0; L<2; L++){
      float scale = (L==0) ? 14.0 : 26.0;
      vec2 gp = p*scale;
      vec2 cell = floor(gp);
      vec2 fr = fract(gp);
      float hz = hash21(cell + float(L)*13.7);
      vec2 sp = vec2(hash21(cell+0.31+float(L)), hash21(cell+0.77+float(L)));
      float ds = length(fr - sp);
      float tw = 0.55 + 0.45*sin(t*(0.6+hz*1.8) + hz*6.28);
      float star = smoothstep(0.06, 0.0, ds) * step(0.82, hz) * tw;
      /* only outside the disc, fade near it */
      float far = smoothstep(R*1.02, R*1.6, r);
      vec3 warm = mix(vec3(1.0,0.55,0.2), vec3(1.0,0.85,0.5), hz);
      col += star * far * mix(warm, vec3(0.55,0.75,1.25), step(0.955, hz)) * 0.8;
    }
  }

  /* =============== SUN DISC =============== */
  float disc = smoothstep(R+px, R-px, r);
  if(disc > 0.0){
    float rr = min(r, R*0.9999);
    float z = sqrt(R*R - rr*rr);
    vec3 n = vec3(p, z) / R;                 /* unit sphere normal */
    n = rotX(-u_pointer.y*0.055) * rotY(t*0.015*u_motion + u_pointer.x*0.070) * n;
    float mu = clamp(z/R, 0.0, 1.0);         /* 1 center, 0 at limb */

    /* ---- domain warp: the churn ---- */
    vec4 P = vec4(n*2.1, t*0.11);
    vec3 w = vec3( fbm3(P + vec4(0.0, 0.0, 0.0, 3.1)),
                   fbm3(P + vec4(5.2, 1.3, 2.8, 1.7)),
                   fbm3(P + vec4(1.7, 9.2, 4.1, 8.3)) );
    vec3 np = n + 0.38*w;

    /* ---- electric filament web: per-octave sharpened ridges ---- */
    float webSharp = 0.0, webHalo = 0.0;
    {
      vec4 q = vec4(np*5.0, t*0.14);
      float aS = 0.50, aH = 0.50;
      for(int i=0;i<6;i++){
        float rn = max(1.0 - abs(snoise(q)), 0.0);
        float r4 = rn*rn*rn*rn; float r8 = r4*r4;
        webSharp += aS * pow(rn, 14.0);                  /* rn^16: crisp thin threads */
        webHalo  += aH * r4*rn * 0.35;           /* rn^5: ember bed           */
        q.xyz *= 2.0; q.w *= 1.3;
        aS *= 0.75;                              /* flat falloff: fine detail survives */
        aH *= 0.55;
      }
    }

    /* fine secondary web: voronoi crack edges */
    vec2 v2 = voronoi(np*9.0, t*0.5);
    float e2 = v2.y - v2.x;
    float crack = smoothstep(0.055, 0.0, e2) * 0.45;

    /* brightness varies along threads */
    float flicker = 0.80 + 0.40*fbm3(vec4(np*4.2, t*0.5 + 7.7));

    /* ---- hot patches: some regions blaze ---- */
    float patch = fbm(vec4(n*1.6, t*0.05) + vec4(2.2, 5.1, 0.7, 0.0));
    float hot = (0.60 + 0.60*smoothstep(0.0, 0.75, patch)) * 0.71;

    /* ---- base surface: dark cells, threads carry the light ---- */
    float mottle = 0.5 + 0.5*fbm3(vec4(np*3.4, t*0.2));
    vec3 base = mix(vec3(0.050, 0.009, 0.004), vec3(0.17, 0.035, 0.012), mottle) * 0.70;

    /* ---- micro-grain shimmer on the threads ---- */
    float grain = 0.85 + 0.30*snoise(vec4(np*24.0, t*0.7));

    /* ---- filament intensity & color ramp ---- */
    float artery = 0.0;
    {
      vec4 qa = vec4(np*2.3, t*0.10);
      float rna = max(1.0 - abs(snoise(qa)), 0.0);
      float ra4 = rna*rna*rna*rna;
      artery = ra4*ra4*ra4*rna*rna;
    }
    float vI = (webSharp*2.8 + artery*0.90 + webHalo*0.15 + crack*0.35) * flicker * hot * grain;
    vI = 1.55*pow(max(vI, 0.0), 1.35);
    vec3 rampA = vec3(0.62, 0.06, 0.004);   /* ember red         */
    vec3 rampB = vec3(1.00, 0.26, 0.012);   /* red-orange        */
    vec3 rampC = vec3(1.00, 0.52, 0.08);    /* yellow            */
    vec3 rampD = vec3(1.00, 0.93, 0.66);    /* white-hot         */
    vec3 vein = mix(rampA, rampB, clamp(vI, 0.0, 1.0));
    vein = mix(vein, rampC, clamp((vI-1.3)*0.75, 0.0, 1.0));
    vein = mix(vein, rampD, clamp((vI-2.4)*0.8, 0.0, 1.0));
    vein *= 1.0 + 0.6*smoothstep(2.2, 3.4, vI);

    /* ---- violet-magenta woven through mid-intensity threads ---- */
    float vio = smoothstep(0.24, 0.68, fbm3(vec4(n*1.6 + 11.3, t*0.07)));
    vein = mix(vein, vec3(0.85, 0.34, 1.35), vio*1.0*(1.0 - smoothstep(2.0, 3.2, vI)));

    /* ---- ionized blue notes — hottest plasma runs cool-blue ---- */
    float ion = smoothstep(0.45, 0.85, fbm3(vec4(n*3.1 + 4.7, t*0.09)));
    vein = mix(vein, vec3(0.35, 0.68, 1.35), ion*0.44*(1.0 - smoothstep(1.8, 2.8, vI)));
    vein = mix(vein, vec3(0.80, 0.90, 1.30), clamp((vI-2.9)*0.9, 0.0, 1.0)*0.58);

    /* ---- the dark serpent channel (computed BEFORE veins applied) ---- */
    float chField = fbm(vec4(n*0.80 + 0.30*w, t*0.03) + vec4(9.4, 3.7, 6.1, 0.0));
    float a = abs(chField + 0.03);
    float channel = smoothstep(0.168, 0.050, a);          /* 1 inside the snake */
    float chRim   = smoothstep(0.238, 0.168, a) * (1.0 - smoothstep(0.168, 0.096, a));

    vI *= 1.0 - 0.97*channel;                            /* threads die in it  */
    vec3 surf = base * (1.0 - 0.95*channel) + vein * vI;
    surf += channel * vec3(0.030, 0.006, 0.002);         /* warm ember floor   */
    surf += chRim * vec3(1.00, 0.45, 0.08) * 0.65;       /* lit banks          */

    /* ---- limb glow: thin blazing rim ---- */
    float limb = pow(1.0 - mu, 6.0);
    surf += limb * vec3(1.00, 0.38, 0.06) * 1.35;
    float protr = 0.72 + 0.55*fbm3(vec4(p/max(r,1e-4)*6.0, 3.3, t*0.1));
    float rim = smoothstep(R*0.978, R*1.0, r);
    surf += rim * vec3(1.00, 0.70, 0.28) * 3.2 * protr;

    col = mix(col, surf, disc);
  }

  /* Reinhard-encoded HDR store: decoded and tone-mapped in post */
  col = col / (col + 1.0);

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
    document.title = 'SHADER ERROR';
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const locA = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(locA);
gl.vertexAttribPointer(locA, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uPointer = gl.getUniformLocation(prog, 'u_pointer');
const uMotion = gl.getUniformLocation(prog, 'u_motion');

/* ================= multipass post: emissive bloom + filmic composite ================= */
const QFS_H = 'precision highp float; uniform vec2 u_size;';
const FS_BR = QFS_H + `
uniform sampler2D u_tex;
void main(){
  vec2 uv = gl_FragCoord.xy / u_size;
  vec3 e = texture2D(u_tex, uv).rgb;
  vec3 hdr = e / max(1.0 - e, 0.004);
  gl_FragColor = vec4(max(hdr - 0.50, 0.0) * 0.25, 1.0);
}`;
const FS_BL = QFS_H + `
uniform sampler2D u_tex;
uniform vec2 u_dir;
void main(){
  vec2 uv = gl_FragCoord.xy / u_size;
  vec3 c = texture2D(u_tex, uv).rgb * 0.227027;
  c += texture2D(u_tex, uv + u_dir*1.3846).rgb * 0.3162162;
  c += texture2D(u_tex, uv - u_dir*1.3846).rgb * 0.3162162;
  c += texture2D(u_tex, uv + u_dir*3.2308).rgb * 0.0702703;
  c += texture2D(u_tex, uv - u_dir*3.2308).rgb * 0.0702703;
  gl_FragColor = vec4(c, 1.0);
}`;
const FS_CM = QFS_H + `
uniform sampler2D u_scene;
uniform sampler2D u_b1;
uniform sampler2D u_b2;
vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }
float hash12(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
void main(){
  vec2 uv = gl_FragCoord.xy / u_size;
  vec3 e = texture2D(u_scene, uv).rgb;
  vec3 scene = e / max(1.0 - e, 0.004);
  vec3 hdr = scene + texture2D(u_b1, uv).rgb*4.0*0.85 + texture2D(u_b2, uv).rgb*4.0*0.85;
  float lum = dot(hdr, vec3(0.2126, 0.7152, 0.0722));
  hdr = max(mix(vec3(lum), hdr, 1.22), 0.0);
  vec3 col = aces(hdr * 0.9);
  col = pow(col, vec3(1.0/2.2));
  col += (hash12(gl_FragCoord.xy) - 0.5) / 255.0;
  gl_FragColor = vec4(col, 1.0);
}`;
function makeProgQ(src){
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, src));
  gl.linkProgram(p);
  return { p, la: gl.getAttribLocation(p, 'a') };
}
const pBright = makeProgQ(FS_BR), pBlur = makeProgQ(FS_BL), pComp = makeProgQ(FS_CM);
let sceneT = null, halfA = null, halfB = null, quartA = null, quartB = null;
function makeTargetQ(w, h){
  w = Math.max(2, w); h = Math.max(2, h);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fb, tex, w, h };
}
function freeTargetQ(t){ if(t){ gl.deleteTexture(t.tex); gl.deleteFramebuffer(t.fb); } }
function allocTargetsQ(){
  [sceneT, halfA, halfB, quartA, quartB].forEach(freeTargetQ);
  const W = canvas.width, H = canvas.height;
  sceneT = makeTargetQ(W, H);
  halfA = makeTargetQ(W>>1, H>>1); halfB = makeTargetQ(W>>1, H>>1);
  quartA = makeTargetQ(W>>2, H>>2); quartB = makeTargetQ(W>>2, H>>2);
}
function quadPassQ(pr, target, setup){
  gl.useProgram(pr.p);
  gl.bindFramebuffer(gl.FRAMEBUFFER, target ? target.fb : null);
  const w = target ? target.w : canvas.width, h = target ? target.h : canvas.height;
  gl.viewport(0, 0, w, h);
  gl.uniform2f(gl.getUniformLocation(pr.p, 'u_size'), w, h);
  setup(pr.p, w, h);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(pr.la);
  gl.vertexAttribPointer(pr.la, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}
function bindTexQ(p, unit, name, tex){
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(gl.getUniformLocation(p, name), unit);
}
function postProcessQ(){
  quadPassQ(pBright, halfA, (p) => bindTexQ(p, 0, 'u_tex', sceneT.tex));
  for(let i=0;i<2;i++){
    quadPassQ(pBlur, halfB, (p,w,h) => { bindTexQ(p,0,'u_tex',halfA.tex); gl.uniform2f(gl.getUniformLocation(p,'u_dir'), 1.0/w, 0); });
    quadPassQ(pBlur, halfA, (p,w,h) => { bindTexQ(p,0,'u_tex',halfB.tex); gl.uniform2f(gl.getUniformLocation(p,'u_dir'), 0, 1.0/h); });
  }
  quadPassQ(pBlur, quartA, (p,w,h) => { bindTexQ(p,0,'u_tex',halfA.tex); gl.uniform2f(gl.getUniformLocation(p,'u_dir'), 1.0/w, 0); });
  for(let i=0;i<3;i++){
    quadPassQ(pBlur, quartB, (p,w,h) => { bindTexQ(p,0,'u_tex',quartA.tex); gl.uniform2f(gl.getUniformLocation(p,'u_dir'), 1.0/w, 0); });
    quadPassQ(pBlur, quartA, (p,w,h) => { bindTexQ(p,0,'u_tex',quartB.tex); gl.uniform2f(gl.getUniformLocation(p,'u_dir'), 0, 1.0/h); });
  }
  quadPassQ(pComp, null, (p) => {
    bindTexQ(p, 0, 'u_scene', sceneT.tex);
    bindTexQ(p, 1, 'u_b1', halfA.tex);
    bindTexQ(p, 2, 'u_b2', quartA.tex);
  });
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(locA);
  gl.vertexAttribPointer(locA, 2, gl.FLOAT, false, 0, 0);
  gl.activeTexture(gl.TEXTURE0);
}


/* adaptive resolution: hold frame rate on weaker GPUs */
let scale = 1.0;
const maxScale = Math.min(window.devicePixelRatio || 1, 2);

function resize(){
  canvas.width = Math.max(2, Math.floor(innerWidth * maxScale * scale));
  canvas.height = Math.max(2, Math.floor(innerHeight * maxScale * scale));
  gl.viewport(0, 0, canvas.width, canvas.height);
}
addEventListener('resize', resize);
resize();

let start = performance.now();
let last = start, ema = 16, tick = 0;
const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const pointer = {tx:0,ty:0,x:0,y:0};
addEventListener('pointermove',e=>{
  if(reducedMotion) return;
  pointer.tx=(e.clientX/innerWidth-.5)*2;
  pointer.ty=(e.clientY/innerHeight-.5)*2;
},{passive:true});
addEventListener('pointerleave',()=>{pointer.tx=0;pointer.ty=0;},{passive:true});

function frame(now){
  const dt = now - last; last = now;
  if(dt < 500) ema = ema*0.92 + dt*0.08;
  if(++tick % 90 === 0){
    if(ema > 24 && scale > 0.55){ scale -= 0.15; resize(); }
    else if(ema < 11 && scale < 1.0){ scale += 0.15; if(scale>1) scale=1; resize(); }
  }
  if(!sceneT || sceneT.w !== canvas.width || sceneT.h !== canvas.height) allocTargetsQ();
  gl.bindFramebuffer(gl.FRAMEBUFFER, sceneT.fb);
  gl.viewport(0, 0, canvas.width, canvas.height);
  pointer.x += (pointer.tx-pointer.x)*0.055;
  pointer.y += (pointer.ty-pointer.y)*0.055;
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, (now - start) / 1000 + 12.0);
  gl.uniform2f(uPointer, pointer.x, pointer.y);
  gl.uniform1f(uMotion, reducedMotion ? 0.18 : 1.0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  postProcessQ();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
